<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro | ToolifyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: radial-gradient(circle at top, #1e1b4b, #030712); color: var(--text-main); 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; 
        }
        
        .ai-container {
            width: 100%; max-width: 650px; background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 28px; padding: 25px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; height: 85vh; position: relative;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; margin-bottom: 15px; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; animation: slideUp 0.3s ease-out; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-bubble { background: rgba(255,255,255,0.07); align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; color: #e2e8f0; }
        .user-bubble { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }

        .input-box { display: flex; gap: 12px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 20px; border: 1px solid var(--glass-border); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 5px 10px; outline: none; font-size: 1rem; }
        button { background: var(--primary); border: none; color: white; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        button:hover:not(:disabled) { transform: scale(1.1) rotate(-10deg); background: var(--secondary); }
        button:disabled { opacity: 0.5; filter: grayscale(1); }
        
        .loading { display: none; align-items: center; gap: 8px; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 10px; padding-left: 10px; }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body>

    <div class="ai-container">
        <div class="header">
            <h1>NEXUS AI PRO <span class="status-dot status-online"></span></h1>
            <p style="color: var(--text-dim); font-size: 0.75rem; margin-top: 5px;">ToolifyPro Intelligence System v2.0</p>
        </div>

        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">System Initialized. Namaste! Main active hoon. Poochiye kya poochna hai?</div>
        </div>

        <div id="loader" class="loading">
            <div class="dot" style="animation-delay: 0s"></div>
            <div class="dot" style="animation-delay: 0.2s"></div>
            <div class="dot" style="animation-delay: 0.4s"></div>
            <span>Nexus is thinking...</span>
        </div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Type your command..." autocomplete="off">
            <button id="sendBtn" onclick="ask()">🚀</button>
        </div>

        <a href="index.html" style="text-align:center; color: var(--text-dim); text-decoration:none; font-size:0.7rem; margin-top:15px; opacity:0.6;">← Exit System</a>
    </div>

    <script>
        const API_KEY = "AIzaSyDrl3hWYggKsSYiahYdWWy2gmA1SuZyHkM";
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const loader = document.getElementById('loader');

        // GOD MODE: Multiple strategies to get a response
        const strategies = [
            { ver: 'v1beta', model: 'gemini-1.5-flash' },
            { ver: 'v1', model: 'gemini-1.5-flash' },
            { ver: 'v1beta', model: 'gemini-pro' }
        ];

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") ask(); });

        async function ask() {
            const prompt = input.value.trim();
            if (!prompt || btn.disabled) return;

            addBubble(prompt, 'user-bubble');
            input.value = "";
            btn.disabled = true;
            loader.style.display = "flex";

            let responseFound = false;

            for (let s of strategies) {
                try {
                    const url = `https://generativelanguage.googleapis.com/${s.ver}/models/${s.model}:generateContent?key=${API_KEY}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();

                    if (data.candidates && data.candidates[0].content) {
                        const text = data.candidates[0].content.parts[0].text;
                        addBubble(text, 'ai-bubble');
                        responseFound = true;
                        break; 
                    } else if (data.error) {
                        console.error(`Strategy ${s.ver}/${s.model} failed:`, data.error.message);
                    }
                } catch (err) {
                    console.error("Network Error on strategy:", s);
                }
            }

            if (!responseFound) {
                addBubble("System Error: Bhai, API Key sahi hai aur Enabled bhi hai, par Google ke servers nakhre kar rahe hain. Ek baar Inspect (F12) karke Console check karo!", 'ai-bubble');
            }

            loader.style.display = "none";
            btn.disabled = false;
            input.focus();
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-87V4WX8GHQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-87V4WX8GHQ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --neon: #00f2ff;
            --neon-dim: rgba(0, 242, 255, 0.2);
            --danger: #ff0055;
            --system: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
            position: relative;
        }

        /* 🟢 MATRIX GRID EFFECT */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10;
        }

        .terminal-box {
            width: 90%; max-width: 850px; height: 75vh;
            background: rgba(0, 10, 10, 0.9);
            border: 1px solid var(--neon);
            box-shadow: 0 0 25px var(--neon-dim), inset 0 0 15px var(--neon-dim);
            padding: 25px; border-radius: 8px;
            display: flex; flex-direction: column; position: relative;
            z-index: 20;
        }

        .header { 
            border-bottom: 1px solid var(--neon-dim); 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .output-area { 
            flex: 1; 
            overflow-y: auto; 
            font-size: 0.95rem; 
            line-height: 1.6;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        .output-area::-webkit-scrollbar { width: 5px; }
        .output-area::-webkit-scrollbar-thumb { background: var(--neon-dim); border-radius: 10px; }

        .input-line { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-top: 15px;
            border-top: 1px solid var(--neon-dim);
            padding-top: 15px;
        }

        input { 
            background: transparent; border: none; color: var(--neon); 
            outline: none; flex: 1; font-family: inherit; font-size: 1rem;
        }

        .system-text { color: var(--system); text-shadow: 0 0 8px var(--neon); margin-bottom: 5px; }
        .neon-text { color: var(--neon); }
        .danger-text { color: var(--danger); text-shadow: 0 0 5px var(--danger); }
        
        /* 🔵 LOADING BAR */
        .progress-container { width: 100%; height: 2px; background: #111; margin-top: 10px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon); transition: 0.3s; box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="terminal-box">
    <div class="header">NEXUS COMMAND CENTER v2.5 - [OPERATOR: YASH] - [STATUS: AI_CONNECTED]</div>
    
    <div class="output-area" id="output">
        <div class="system-text">> BOOTING NEXUS_OS... [OK]</div>
        <div class="system-text">> NEURAL LINK ESTABLISHED... [OK]</div>
        <div class="system-text">> WELCOME TO THE GRID, OPERATOR.</div>
        <div class="system-text">> TYPE 'HELP' FOR COMMANDS OR ASK ANYTHING TO AI.</div>
        <br>
    </div>

    <div class="progress-container" id="loaderContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="input-line">
        <span class="neon-text">[yash@nexus]:~$</span>
        <input type="text" id="commandInput" autofocus spellcheck="false" autocomplete="off">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('commandInput');
    const loaderCont = document.getElementById('loaderContainer');
    const progBar = document.getElementById('progressBar');

    const commands = {
        'help': 'Commands: help, about, status, clear, social, override',
        'about': 'Nexus AI Pro: Next-gen terminal interface by Yash Raj Sharma.',
        'status': 'Core: Stable | AI Backend: Cloudflare Workers | Neural: Active',
        'social': 'GitHub: ToolifyPro | Instagram: @yash404dev',
        'override': 'ACCESS GRANTED. SYSTEM LIMITS REMOVED.'
    };

    input.addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const cmd = input.value.trim();
            if (!cmd) return;

            addLine(`[yash@nexus]:~$ ${cmd}`, 'neon-text');
            input.value = '';

            const lowerCmd = cmd.toLowerCase();

            if (lowerCmd === 'clear') {
                output.innerHTML = '';
            } else if (commands[lowerCmd]) {
                processLocalCommand(commands[lowerCmd]);
            } else {
                // AGAR COMMAND NAHI HAI, TOH AI KO CALL KARO
                await callNexusAI(cmd);
            }
        }
    });

    function addLine(text, className) {
        const div = document.createElement('div');
        div.className = className || '';
        div.innerHTML = `> ${text}`;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function updateLoader(show, width) {
        loaderCont.style.display = show ? 'block' : 'none';
        progBar.style.width = width + '%';
    }

    async function callNexusAI(prompt) {
        updateLoader(true, 30);
        
        try {
            const response = await fetch('https://nexus-ai-backend.yashrajsharma159.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            updateLoader(true, 70);
            const data = await response.json();
            
            updateLoader(false, 0);
            if(data.text) {
                addLine(`[NEXUS_AI]: ${data.text}`, 'system-text');
            } else {
                throw new Error();
            }
        } catch (error) {
            updateLoader(false, 0);
            addLine(`SYSTEM_ERROR: Neural Link timeout. Check backend configuration.`, 'danger-text');
        }
    }

    function processLocalCommand(response) {
        updateLoader(true, 100);
        setTimeout(() => {
            updateLoader(false, 0);
            addLine(response, 'system-text');
        }, 300);
    }
</script>

</body>
</html>

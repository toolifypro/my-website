<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mini | ToolifyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle at top, #1e1b4b, #030712); }
        
        .ai-container {
            width: 100%; max-width: 500px; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .chat-area { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-right: 10px; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .ai-bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .input-box { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 20px; border: 1px solid var(--glass-border); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; outline: none; font-size: 1rem; }
        button { background: var(--primary); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        button:hover { transform: rotate(-15deg) scale(1.1); background: var(--secondary); }

        .back-link { display: block; text-align: center; margin-top: 25px; color: var(--text-dim); text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="ai-container">
        <div class="header">
            <h1>Nexus AI Mini</h1>
            <p style="color: var(--text-dim); font-size: 0.8rem;">V1.0 (Local Engine)</p>
        </div>

        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">Namaste! Main ToolifyPro ka mini AI hoon. Aap mujhse Coding, Math ya Tools ke baare mein pooch sakte hain.</div>
        </div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask me something..." onkeypress="handleKey(event)">
            <button onclick="ask()">🚀</button>
        </div>

        <a href="index.html" class="back-link">← Back to Hub</a>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        // Local Brain (Dheere dheere isse bada karenge)
        const responses = {
            "hello": "Hi there! Main aapki kya madad kar sakta hoon?",
            "kaise ho": "Main ekdum badiya! Aap batao, kya chal raha hai?",
            "who are you": "Main ToolifyPro ka AI Assistant hoon, jise Gemini ne code kiya hai.",
            "html": "HTML (HyperText Markup Language) web pages banane ka base hai.",
            "css": "CSS se hum web pages ko sundar aur 'Nexus' jaisa premium banate hain.",
            "javascript": "JS ek aisi language hai jo website mein jaan daal deti hai (jaise ye chat!).",
            "time": "Abhi ka time: " + new Date().toLocaleTimeString(),
            "date": "Aaj ki date: " + new Date().toLocaleDateString(),
            "help": "Aap mujhse Coding, Calculator, ya ToolifyPro ke baare mein pooch sakte hain!"
        };

        function handleKey(e) { if(e.key === 'Enter') ask(); }

        function ask() {
            let val = input.value.toLowerCase().trim();
            if(!val) return;

            // User Message
            addBubble(input.value, 'user-bubble');
            input.value = "";

            // AI Logic
            setTimeout(() => {
                let reply = "Maaf kijiye, ye abhi version 1.0 hai. Jald hi main internet se connect hokar saare jawab dunga!";
                
                // Check if we have a local answer
                for (let key in responses) {
                    if (val.includes(key)) {
                        reply = responses[key];
                        break;
                    }
                }
                addBubble(reply, 'ai-bubble');
            }, 600);
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #00f2ff;
            --neon-dim: rgba(0, 242, 255, 0.2);
            --danger: #ff0055;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }

        /* 🟢 MATRIX GRID EFFECT */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 10;
        }

        .terminal-box {
            width: 90%; max-width: 800px; height: 70vh;
            background: rgba(0, 20, 20, 0.8);
            border: 1px solid var(--neon);
            box-shadow: 0 0 20px var(--neon-dim), inset 0 0 10px var(--neon-dim);
            padding: 20px; border-radius: 5px;
            display: flex; flex-direction: column; position: relative;
        }

        .header { border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        .output-area { flex: 1; overflow-y: auto; font-size: 0.9rem; line-height: 1.6; }
        .input-line { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        
        input { 
            background: transparent; border: none; color: var(--neon); 
            outline: none; flex: 1; font-family: inherit; font-size: 1rem;
        }

        .cursor { width: 10px; height: 20px; background: var(--neon); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .system-text { color: #fff; text-shadow: 0 0 5px var(--neon); }
        .danger-text { color: var(--danger); text-shadow: 0 0 5px var(--danger); }
        
        /* 🔵 LOADING BAR */
        .progress-container { width: 100%; height: 4px; background: #111; margin-top: 10px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon); transition: 0.5s; }
    </style>
</head>
<body>

<div class="terminal-box">
    <div class="header">NEXUS COMMAND CENTER v2.0 - [STATUS: ENCRYPTED]</div>
    
    <div class="output-area" id="output">
        <div class="system-text">> BOOTING NEXUS_OS... [OK]</div>
        <div class="system-text">> ESTABLISHING SECURE PROTOCOL... [OK]</div>
        <div class="system-text">> WELCOME BACK, OPERATOR YASH.</div>
        <div class="system-text">> TYPE 'HELP' TO SEE AVAILABLE COMMANDS.</div>
        <br>
    </div>

    <div class="progress-container" id="loaderContainer"><div class="progress-bar" id="progressBar"></div></div>

    <div class="input-line">
        <span>[yash@nexus]:~$</span>
        <input type="text" id="commandInput" autofocus spellcheck="false">
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const input = document.getElementById('commandInput');
    const loaderCont = document.getElementById('loaderContainer');
    const progBar = document.getElementById('progressBar');

    const commands = {
        'help': 'Available: help, about, status, clear, override, hack, social',
        'about': 'Nexus AI Pro: A futuristic interface designed by Yash Raj Sharma.',
        'status': 'System: Optimal | Neural Link: Active | CORS: Bypassed via Stealth',
        'social': 'GitHub: ToolifyPro | Instagram: @yash404dev',
        'hack': 'Scanning nearby networks... [REDACTED]... Just kidding, I am a good AI.',
        'override': 'INITIATING SYSTEM OVERRIDE... ACCESS GRANTED.'
    };

    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const cmd = input.value.toLowerCase().trim();
            addLine(`[yash@nexus]:~$ ${cmd}`, 'neon');
            input.value = '';

            if (cmd === 'clear') {
                output.innerHTML = '';
            } else if (commands[cmd]) {
                processCommand(commands[cmd]);
            } else {
                addLine(`Error: Command '${cmd}' not recognized. Try 'help'.`, 'danger-text');
            }
        }
    });

    function addLine(text, className) {
        const div = document.createElement('div');
        div.className = className || '';
        div.innerHTML = `> ${text}`;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function processCommand(response) {
        loaderCont.style.display = 'block';
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                loaderCont.style.display = 'none';
                progBar.style.width = '0%';
                addLine(response, 'system-text');
            } else {
                width += 10;
                progBar.style.width = width + '%';
            }
        }, 50);
    }
</script>

</body>
</html>

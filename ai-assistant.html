<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ✅ GOOGLE ANALYTICS (UNCHANGED) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-87V4WX8GHQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-87V4WX8GHQ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ SEO BOOST -->
    <title>Nexus AI Terminal | Free Online AI Command Interface</title>
    <meta name="description" content="Use Nexus AI Terminal - a futuristic command-line AI assistant powered by Gemini. Ask anything, run commands, and explore tools instantly.">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --neon: #00f2ff;
            --neon-dim: rgba(0, 242, 255, 0.2);
            --danger: #ff0055;
            --system: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
                        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal-box {
            width: 90%; max-width: 850px; height: 75vh;
            background: rgba(0, 10, 10, 0.9);
            border: 1px solid var(--neon);
            box-shadow: 0 0 25px var(--neon-dim), inset 0 0 15px var(--neon-dim);
            padding: 25px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .header {
            border-bottom: 1px solid var(--neon-dim);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .output-area {
            flex: 1;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .input-line {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            border-top: 1px solid var(--neon-dim);
            padding-top: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--neon);
            outline: none;
            flex: 1;
        }

        .system-text { color: var(--system); }
        .danger-text { color: var(--danger); }

        .progress-container {
            width: 100%; height: 2px;
            background: #111;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon);
        }
    </style>
</head>

<body>

<div class="terminal-box">
    <div class="header">NEXUS COMMAND CENTER - AI TERMINAL</div>

    <div class="output-area" id="output">
        <div class="system-text">> System Ready...</div>
        <div class="system-text">> Ask anything or type HELP</div>
        <br>
    </div>

    <div class="progress-container" id="loaderContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="input-line">
        <span>[user@nexus]:~$</span>
        <input type="text" id="commandInput" autofocus>
    </div>
</div>

<script>
const output = document.getElementById('output');
const input = document.getElementById('commandInput');
const loader = document.getElementById('loaderContainer');
const bar = document.getElementById('progressBar');

function addLine(text, type="system-text") {
    const div = document.createElement('div');
    div.className = type;
    div.innerHTML = "> " + text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
}

function setLoader(state) {
    loader.style.display = state ? 'block' : 'none';
    bar.style.width = state ? '70%' : '0%';
}

input.addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
        const cmd = input.value.trim();
        if (!cmd) return;

        addLine(`[user@nexus]: ${cmd}`);
        input.value = "";

        if (cmd.toLowerCase() === "clear") {
            output.innerHTML = "";
            return;
        }

        await callAI(cmd);
    }
});

async function callAI(prompt) {
    setLoader(true);

    try {
        const res = await fetch("https://nexus-ai-backend.yashrajsharma159.workers.dev", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        setLoader(false);

        if (data.reply) {
            addLine("[AI]: " + data.reply);
        } else if (data.error) {
            addLine("ERROR: " + data.error, "danger-text");
            console.log(data);
        } else {
            addLine("Unknown response", "danger-text");
        }

    } catch (err) {
        setLoader(false);
        addLine("Connection failed: " + err.message, "danger-text");
    }
}
</script>

</body>
</html>

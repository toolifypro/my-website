<script>
    async function ask() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loader');
        const prompt = input.value.trim();

        if (!prompt) return;

        addBubble(prompt, 'user-bubble');
        input.value = "";
        loader.style.display = "block";

        // 🤖 Simple AI logic (no API needed)
        setTimeout(() => {
            loader.style.display = "none";

            let reply = generateReply(prompt.toLowerCase());
            typeEffect(reply);

        }, 800);
    }

    function generateReply(text) {
        if (text.includes("hello") || text.includes("hi")) {
            return "Hello 👋 Main Nexus AI hoon! Kaise help karu?";
        }

        if (text.includes("homework")) {
            return "Homework ke liye AI use kar sakte ho 😎 Topic batao main help karta hoon!";
        }

        if (text.includes("who are you")) {
            return "Main Nexus AI hoon 🤖 ToolifyPro ka assistant!";
        }

        if (text.includes("ai")) {
            return "AI ek smart technology hai jo human jaisa soch sakti hai 😎";
        }

        // fallback smart reply
        return "Interesting 🤔 Thoda aur detail me batao taaki main better help kar saku!";
    }

    function typeEffect(text) {
        const chatBox = document.getElementById('chat');
        const b = document.createElement('div');
        b.className = `bubble ai-bubble`;
        chatBox.appendChild(b);

        let i = 0;
        const speed = 20;

        function typing() {
            if (i < text.length) {
                b.innerText += text.charAt(i);
                i++;
                setTimeout(typing, speed);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        typing();
    }

    function addBubble(text, type) {
        const b = document.createElement('div');
        b.className = `bubble ${type}`;
        b.innerText = text;
        const chatBox = document.getElementById('chat');
        chatBox.appendChild(b);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

   document.addEventListener("DOMContentLoaded", () => {

    document.getElementById('userInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") ask();
        
    });
</script>

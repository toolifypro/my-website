<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro | ToolifyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #030712; --glass: rgba(255, 255, 255, 0.03); --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top, #1e1b4b, #030712); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .ai-container { width: 100%; max-width: 600px; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 30px; height: 85vh; display: flex; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
        .ai-bubble { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .input-box { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button { background: var(--primary); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        .loading { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="ai-container">
        <h2 style="text-align: center; margin-bottom: 20px;">Nexus AI Pro 🤖</h2>
        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">Namaste! Main ab fully active hoon. Poochiye kya poochna hai?</div>
        </div>
        <div id="loader" class="loading">AI soch raha hai...</div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask me anything...">
            <button onclick="ask()">🚀</button>
        </div>
    </div>

    <script type="module">
        // Hum Google ki official web library use karenge
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyDrl3hWYggKsSYiahYdWWy2gmA1SuZyHkM";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.ask = async function() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const loader = document.getElementById('loader');
            const prompt = input.value.trim();

            if (!prompt) return;

            // User message
            addBubble(prompt, 'user-bubble');
            input.value = "";
            loader.style.display = "block";

            try {
                // Yahan hum model ko manually select kar rahe hain
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                loader.style.display = "none";
                addBubble(text, 'ai-bubble');
            } catch (error) {
                loader.style.display = "none";
                console.error(error);
                addBubble("Error: Bhai, lagta hai iss API key par Gemini Flash allowed nahi hai. Main dusra model try karta hoon...", 'ai-bubble');
                
                // Fallback to Gemini Pro
                try {
                    const modelPro = genAI.getGenerativeModel({ model: "gemini-pro" });
                    const resultPro = await modelPro.generateContent(prompt);
                    const responsePro = await resultPro.response;
                    addBubble(responsePro.text(), 'ai-bubble');
                } catch (err2) {
                    addBubble("Bhai, serious issue hai. Google Cloud Console mein jaake 'Generative Language API' ko ENABLE karo.", 'ai-bubble');
                }
            }
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            document.getElementById('chat').appendChild(b);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        // Enter key support
        document.getElementById('userInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") ask();
        });
    </script>
</body>
</html>

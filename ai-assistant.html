<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro | ToolifyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg); color: var(--text-main); min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; padding: 20px; 
            background: radial-gradient(circle at top, #1e1b4b, #030712); 
        }
        
        .ai-container {
            width: 100%; max-width: 600px; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; height: 85vh;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 1.8rem; font-weight: 800; 
            background: linear-gradient(to right, #818cf8, #c084fc); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .chat-area { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 15px; margin-bottom: 20px; padding-right: 10px; 
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .bubble { 
            max-width: 85%; padding: 12px 18px; border-radius: 20px; 
            font-size: 0.95rem; line-height: 1.5; animation: pop 0.3s ease; 
            word-wrap: break-word; 
        }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .ai-bubble { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; 
        }
        .user-bubble { 
            background: var(--primary); color: white; align-self: flex-end; 
            border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); 
        }

        .input-box { 
            display: flex; gap: 10px; background: rgba(0,0,0,0.3); 
            padding: 8px; border-radius: 20px; border: 1px solid var(--glass-border); 
        }
        input { 
            flex: 1; background: transparent; border: none; color: white; 
            padding: 10px 15px; outline: none; font-size: 1rem; 
        }
        button { 
            background: var(--primary); border: none; color: white; 
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s; 
        }
        button:hover:not(:disabled) { background: var(--secondary); transform: scale(1.05); }
        button:disabled { background: var(--text-dim); cursor: not-allowed; opacity: 0.5; }
        
        .loading-dots { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 8px; height: 8px; background: var(--text-dim); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-dim); text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="ai-container">
        <div class="header">
            <h1>Nexus AI Pro 🤖</h1>
            <p style="color: var(--text-dim); font-size: 0.8rem;">Multimodel AI (Gemini Flash/Pro)</p>
        </div>

        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">Namaste! Main ToolifyPro ka AI hoon. Poochiye kya poochhna hai?</div>
        </div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask anything (Coding, Math)..." autocomplete="off">
            <button id="sendBtn">🚀</button>
        </div>

        <a href="index.html" class="back-link">← Back to Hub</a>
    </div>

    <script>
        const API_KEY = "AIzaSyDrl3hWYggKsSYiahYdWWy2gmA1SuZyHkM"; 
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        // Sabse stable endpoints ki list
        const endpoints = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`
        ];

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") ask(); });
        btn.addEventListener("click", ask);

        async function ask() {
            const prompt = input.value.trim();
            if (!prompt || btn.disabled) return;

            addBubble(prompt, 'user-bubble');
            input.value = "";
            btn.disabled = true;

            const loadingId = "load-" + Date.now();
            addLoadingBubble(loadingId);

            let success = false;
            
            // Loop through endpoints until one works
            for (let url of endpoints) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();

                    if (data.candidates && data.candidates[0].content) {
                        removeLoading(loadingId);
                        addBubble(data.candidates[0].content.parts[0].text, 'ai-bubble');
                        success = true;
                        break; // Mil gaya jawab!
                    }
                } catch (err) {
                    console.warn("Retrying with next endpoint...");
                }
            }

            if (!success) {
                removeLoading(loadingId);
                addBubble("Bhai, Google ke saare raaste band hain. Lagta hai API Key abhi activate nahi hui. 15 min baad try karo!", 'ai-bubble');
            }
            
            btn.disabled = false;
            input.focus();
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
        }

        function addLoadingBubble(id) {
            const b = document.createElement('div');
            b.className = 'bubble ai-bubble';
            b.id = id;
            b.innerHTML = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeLoading(id) {
            const loader = document.getElementById(id);
            if (loader) chat.removeChild(loader);
        }
    </script>
</body>
</html>

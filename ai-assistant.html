<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro | The Futurist Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Futuristic Cyberpunk Palette */
            --bg: #030712;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(99, 102, 241, 0.15);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            
            /* NEON ACCENTS */
            --neon-blue: #00e5ff;
            --neon-purple: #9333ea;
            --primary: #6366f1;
            
            /* UI Elements */
            --bubble-user: #6366f1;
            --bubble-ai: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s ease; }

        body { 
            background-color: var(--bg); color: var(--text-main); min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; padding: 20px; 
            overflow: hidden;
            background: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
                var(--bg);
        }

        /* 🟢 FUTURISTIC BACKGROUND GRID */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(0deg, var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
            z-index: -1;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 400px; } }

        /* 🟦 AI CONTAINER - Advanced Glassmorphism */
        .ai-container {
            width: 100%; max-width: 700px; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px; 
            box-shadow: 
                0 0 50px rgba(99, 102, 241, 0.2), 
                inset 0 0 20px rgba(0, 229, 255, 0.05);
            display: flex; flex-direction: column; height: 85vh; position: relative;
            animation: entrance 1s ease-out;
        }
        @keyframes entrance { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        
        /* 🔵 NEON LOGO HEADER */
        .header h1 { 
            font-size: 1.8rem; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .header h1::before, .header h1::after { content: " | "; color: var(--neon-blue); font-weight: 300; opacity: 0.5; }

        /* 🟣 STATUS LIGHT */
        .status { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); animation: pulse statusPulse infinite; }
        @keyframes statusPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }

        /* 📜 CHAT AREA */
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding-right: 10px; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }

        /* 💬 BUBBLES */
        .bubble { max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; animation: bubblePop 0.4s ease-out; position: relative; word-wrap: break-word; }
        @keyframes bubblePop { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        /* AI BUBBLE - Cyberpunk Style */
        .ai-bubble { 
            background: var(--bubble-ai); align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; color: #e2e8f0; 
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 2px solid var(--neon-purple);
            box-shadow: inset 0 0 15px rgba(168, 85, 247, 0.1);
        }
        
        /* USER BUBBLE - Primary Neon Style */
        .user-bubble { 
            background: var(--bubble-user); align-self: flex-end; border-bottom-right-radius: 4px; 
            color: white; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.4);
            border-right: 2px solid var(--neon-blue);
        }

        /* ⌨️ INPUT BOX - Sleek Design */
        .input-box { display: flex; gap: 12px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 20px; border: 1px solid var(--glass-border); transition: 0.4s; }
        .input-box:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 5px 15px; outline: none; font-size: 1rem; }
        
        /* 🚀 SEND BUTTON - Advanced Interaction */
        button { 
            background: var(--bubble-user); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            position: relative; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); opacity: 0; transition: 0.4s; }
        button:hover { transform: scale(1.1) rotate(-10deg); }
        button:hover::before { opacity: 1; }
        button:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        button span { z-index: 1; } /* Rocket icon above gradient */
        
        /* 💡 LOADING SPINNER */
        #loader { display: none; text-align: center; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 10px; padding: 5px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; animation: textBlink 1.5s infinite; }
        @keyframes textBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .back-link { display: block; text-align: center; margin-top: 25px; color: var(--neon-purple); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; transition: 0.4s; }
        .back-link:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* SCROLLBAR for Chat */
        .chat-area { -ms-overflow-style: none; scrollbar-width: thin; }
    </style>
</head>
<body>

    <div class="ai-container">
        <div class="header">
            <h1>NEXUS AI PRO</h1>
            <div class="status">
                <div class="status-dot"></div>
                SYSTEM ONLINE | MISTRAL V2 MODEL
            </div>
        </div>

        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">Namaste! Sssun, Maine website theme apply kar diya hai. Ab main fully active hoon. Poochiye kya poochna hai?</div>
        </div>

        <div id="loader">Processing Neural Network...</div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask Me..." autocomplete="off">
            <button onclick="ask()"><span>🚀</span></button>
        </div>

        <a href="index.html" class="back-link">← EXIT SYSTEM HUB</a>
    </div>

    <script>
        // Maine Mistral Model Use Kiya kyunki teri Gemini API synchronization issues de rahi hai. Mistral best open-source AI hai.
        const HF_TOKEN = "hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"; // APNA HUGGING FACE READ TOKEN YAHAN DAALO
        
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const loader = document.getElementById('loader');

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") ask(); });

        async function ask() {
            const prompt = input.value.trim();
            if (!prompt) return;

            // UI: User Message
            addBubble(prompt, 'user-bubble');
            input.value = "";
            loader.style.display = "block";
            input.disabled = true;

            try {
                // NEURAL CALL: Mistral 7B Instruct v0.2
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${HF_TOKEN}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        inputs: `Namaste! Mistral, main ToolifyPro ka AI hoon. Ek user se 'Namaste' bolna aur fir reply dena. Sawal: ${prompt}`,
                        parameters: { max_new_tokens: 1000, temperature: 0.7, repetition_penalty: 1.1 }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Mistral Server Issues!");
                }

                // AI Response (Full text minus prompt)
                let aiText = data[0].generated_text || "Bhai, connection error!";
                aiText = aiText.split(prompt).pop().trim(); // Prompt ko reply se remove karo
                
                if(!aiText) aiText = "Sssun, reply format error! Dobara try karo!";

                loader.style.display = "none";
                addBubble(aiText, 'ai-bubble');

            } catch (error) {
                console.error(error);
                loader.style.display = "none";
                addBubble("System Error: Bhai, lagta hai Hugging Face ka token sahi nahi hai ya Mistral server down hai.", 'ai-bubble');
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            chat.appendChild(b);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro | ToolifyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --neon-blue: #00e5ff;
            --neon-purple: #9333ea;
            --primary: #6366f1;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(99, 102, 241, 0.2);
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg); color: var(--text-main); min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; padding: 20px; 
            overflow: hidden;
            background: radial-gradient(circle at top, #1e1b4b, #030712);
        }

        /* 🟢 FUTURISTIC GRID BACKGROUND */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            opacity: 0.15; z-index: -1; animation: move 20s linear infinite;
        }
        @keyframes move { from { background-position: 0 0; } to { background-position: 0 500px; } }

        /* 🟦 AI CONTAINER */
        .ai-container {
            width: 100%; max-width: 650px; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.2);
            display: flex; flex-direction: column; height: 85vh;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .header h1 { 
            font-size: 1.7rem; font-weight: 800; letter-spacing: 1px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        /* 📜 CHAT AREA */
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 10px; margin-bottom: 15px; scroll-behavior: smooth; }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        /* 💬 BUBBLES */
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; animation: pop 0.3s ease; word-wrap: break-word; }
        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ai-bubble { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid var(--neon-blue); white-space: pre-wrap; }
        .user-bubble { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }

        /* ⌨️ INPUT BOX */
        .input-box { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 18px; border: 1px solid var(--glass-border); }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; padding: 0 10px; }
        
        button { 
            background: linear-gradient(135deg, var(--primary), var(--neon-purple));
            border: none; color: white; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.1) rotate(-10deg); box-shadow: 0 0 15px var(--primary); }
        
        #loader { display: none; text-align: center; color: var(--neon-blue); font-size: 0.8rem; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="ai-container">
        <div class="header">
            <h1>NEXUS AI PRO</h1>
            <p style="font-size: 0.7rem; color: #94a3b8; letter-spacing: 2px; margin-top: 5px;">HUGGING FACE ENGINE ONLINE</p>
        </div>

        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">Namaste! Main Nexus AI hoon. ToolifyPro Hub mein aapka swagat hai. Main aapki kya madad kar sakta hoon?</div>
        </div>

        <div id="loader">NEURAL PROCESSING...</div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Initialize command..." autocomplete="off">
            <button onclick="ask()">🚀</button>
        </div>

        <a href="index.html" style="text-align: center; color: #475569; text-decoration: none; font-size: 0.7rem; margin-top: 15px; opacity: 0.6;">← EXIT TERMINAL</a>
    </div>

    <script>
        const HF_TOKEN = "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"; 

        async function ask() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const loader = document.getElementById('loader');
            const prompt = input.value.trim();

            if (!prompt) return;

            addBubble(prompt, 'user-bubble');
            input.value = "";
            loader.style.display = "block";

            try {
                // Using Mistral-7B-Instruct-v0.2 as it's highly reliable
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        inputs: `<s>[INST] ${prompt} [/INST]`,
                        parameters: { max_new_tokens: 500, return_full_text: false }
                    })
                });

                const data = await response.json();
                loader.style.display = "none";

                if (data.error) {
                    addBubble("Bhai, server thoda busy hai. Ek minute baad try karna!", 'ai-bubble');
                } else {
                    const aiText = data[0].generated_text || "Bhai, reply khali aaya!";
                    addBubble(aiText, 'ai-bubble');
                }

            } catch (error) {
                console.error(error);
                loader.style.display = "none";
                addBubble("System Error: Connection failed. Check your internet or token permissions!", 'ai-bubble');
            }
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            const chatBox = document.getElementById('chat');
            chatBox.appendChild(b);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('userInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") ask();
        });
    </script>
</body>
</html>

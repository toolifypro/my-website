<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro | ToolifyPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #030712; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: radial-gradient(circle at top, #1e1b4b, #030712); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .ai-container { width: 100%; max-width: 600px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px; height: 85vh; display: flex; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
        .ai-bubble { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .input-box { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 0 10px; }
        button { background: var(--primary); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        #loader { display: none; font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="ai-container">
        <h2 style="text-align: center; margin-bottom: 20px; background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NEXUS AI PRO</h2>
        <div class="chat-area" id="chat">
            <div class="bubble ai-bubble">System Ready. Poochiye kya poochna hai?</div>
        </div>
        <div id="loader">Nexus is thinking...</div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="ask()">🚀</button>
        </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const API_KEY = "AIzaSyDrl3hWYggKsSYiahYdWWy2gmA1SuZyHkM";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.ask = async function() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const loader = document.getElementById('loader');
            const prompt = input.value.trim();

            if (!prompt) return;

            // UI: User Message
            addBubble(prompt, 'user-bubble');
            input.value = "";
            loader.style.display = "block";

            try {
                // God Mode Call
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                loader.style.display = "none";
                addBubble(text, 'ai-bubble');
            } catch (error) {
                console.error(error);
                loader.style.display = "none";
                addBubble("Bhai, error abhi bhi hai. Ek baar 'F12' dabao aur dekho Console mein 'CORS' likha aa raha hai kya?", 'ai-bubble');
            }
        }

        function addBubble(text, type) {
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerText = text;
            document.getElementById('chat').appendChild(b);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        document.getElementById('userInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") ask();
        });
    </script>
</body>
</html>

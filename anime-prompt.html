            color: white; outline: none; transition: 0.3s;
        }

        .prompt-result {
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px;
            margin-top: 25px; border: 1px dashed var(--accent); min-height: 80px;
            font-family: 'Fira Code', monospace; font-size: 0.85rem; text-align: left;
            white-space: pre-wrap; overflow-x: auto;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1; padding: 15px; border-radius: 12px; border: none;
            font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .gen-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .copy-btn { background: var(--glass); color: white; border: 1px solid var(--glass-border); }
        button:hover { transform: translateY(-3px); filter: brightness(1.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-home { position: absolute; top: 20px; left: 20px; color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: 800; }
    </style>

    <a href="index.html" class="back-home">← BACK TO NEXUS</a>

        </div>

        <div class="btn-group">

        </div>
    </div>

    <script>
        async function searchAnime() {
            const query = document.getElementById('query').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('fetchBtn');

            if (!query) {
                alert("Bhai, anime ka naam toh dalo!");
                return;
            }

            // UI Feedback
            resultDiv.innerText = "Searching the multiverse... 🚀";
            btn.disabled = true;
            btn.innerText = "Searching...";

            try {
                // YOUR WORKER URL INTEGRATION
                const res = await fetch(`https://workerjs.yashrajsharma159.workers.dev?q=${encodeURIComponent(query)}`);
                const data = await response = await res.json();

                if (data.results && data.results.length > 0) {
                    resultDiv.innerText = JSON.stringify(data, null, 2);
                } else {
                    resultDiv.innerText = "❌ No results found for this query.";
                }
            } catch (error) {
                resultDiv.innerText = "⚠️ Error: Worker se connect nahi ho pa raha. Check CORS settings.\n" + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Find Dubs";
            }
        }

        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text);
            alert("Results copied to clipboard! 🧠⚡");
        }

    </script>

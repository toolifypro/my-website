<!DOCTYPE html>
<html lang="en">
<head

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassGuard | ToolifyPro Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #030712 100%);
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Output Box */
        .output-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #password-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: var(--text-main);
            word-break: break-all;
            letter-spacing: 1px;
        }

        .actions { display: flex; gap: 10px; }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-dim);
            transition: 0.2s;
        }
        .action-btn:hover { color: var(--primary); transform: scale(1.1); }

        /* Strength Meter */
        .strength-meter {
            height: 4px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        #strength-bar {
            height: 100%;
            width: 0%;
            transition: 0.4s ease;
        }

        /* Controls */
        .control-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-dim); }
        
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .generate-btn:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .copied-msg {
            position: absolute;
            top: -30px;
            right: 0;
            background: var(--success);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            opacity: 0;
            transition: 0.3s;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { color: var(--primary); }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>PassGuard</h1>
        </div>

        <div class="output-container">
            <span id="password-display">Click Generate</span>
            <div class="actions">
                <span class="copied-msg" id="copied-msg">Copied!</span>
                <button class="action-btn" onclick="copyPassword()" title="Copy">📋</button>
                <button class="action-btn" onclick="generatePassword()" title="Regenerate">🔄</button>
            </div>
        </div>

        <div class="strength-meter">
            <div id="strength-bar"></div>
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>Password Length</span>
                <span id="length-val">12</span>
            </div>
            <input type="range" id="length" min="6" max="32" value="12" oninput="updateLengthLabel()">
        </div>

        <div class="checkbox-container">
            <label class="check-item"><input type="checkbox" id="upper" checked> Uppercase</label>
            <label class="check-item"><input type="checkbox" id="lower" checked> Lowercase</label>
            <label class="check-item"><input type="checkbox" id="numbers" checked> Numbers</label>
            <label class="check-item"><input type="checkbox" id="symbols"> Symbols</label>
        </div>

        <button class="generate-btn" onclick="generatePassword()">Generate Secure Password</button>

        <a href="index.html" class="back-link">← Back to ToolifyPro</a>
    </div>

    <script>
        const chars = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            numbers: "0123456789",
            symbols: "!@#$%^&*()_+~`|}{[]:;?><,./-="
        };

        function updateLengthLabel() {
            document.getElementById('length-val').innerText = document.getElementById('length').value;
        }

        function generatePassword() {
            const length = document.getElementById('length').value;
            const hasUpper = document.getElementById('upper').checked;
            const hasLower = document.getElementById('lower').checked;
            const hasNumbers = document.getElementById('numbers').checked;
            const hasSymbols = document.getElementById('symbols').checked;

            let charPool = "";
            if (hasUpper) charPool += chars.upper;
            if (hasLower) charPool += chars.lower;
            if (hasNumbers) charPool += chars.numbers;
            if (hasSymbols) charPool += chars.symbols;

            if (charPool === "") {
                alert("Please select at least one option!");
                return;
            }

            let password = "";
            for (let i = 0; i < length; i++) {
                password += charPool.charAt(Math.floor(Math.random() * charPool.length));
            }

            const display = document.getElementById('password-display');
            display.innerText = password;
            display.style.animation = "none";
            display.offsetHeight; // trigger reflow
            display.style.animation = "fadeIn 0.5s";

            updateStrength(password);
        }

        function updateStrength(pwd) {
            const bar = document.getElementById('strength-bar');
            let strength = 0;
            if (pwd.length > 8) strength++;
            if (pwd.length > 14) strength++;
            if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) strength++;
            if (/[^A-Za-z0-9]/.test(pwd)) strength++;

            const colors = [varColor('--danger'), varColor('--warning'), varColor('--primary'), varColor('--success')];
            const widths = ['25%', '50%', '75%', '100%'];
            
            bar.style.width = widths[Math.min(strength, 3)];
            bar.style.backgroundColor = colors[Math.min(strength, 3)];
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name);
        }

        function copyPassword() {
            const pwd = document.getElementById('password-display').innerText;
            if (pwd === "Click Generate") return;
            
            navigator.clipboard.writeText(pwd).then(() => {
                const msg = document.getElementById('copied-msg');
                msg.style.opacity = "1";
                msg.style.top = "-40px";
                setTimeout(() => {
                    msg.style.opacity = "0";
                    msg.style.top = "-30px";
                }, 1500);
            });
        }

        // Generate one on load
        window.onload = generatePassword;
    </script>
</body>
</html>

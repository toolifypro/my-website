<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter | Nexus OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --accent: #00f2ff; --bg: #030712; --glass: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .tool-container { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 28px; width: 95%; max-width: 600px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); }
        h2 { font-weight: 800; margin-bottom: 20px; color: #10b981; }
        textarea { width: 100%; height: 300px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; color: #10b981; outline: none; margin-bottom: 20px; font-family: 'Fira Code', monospace; font-size: 13px; resize: none; }
        textarea:focus { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        button { width: 100%; padding: 14px; background: #10b981; color: #030712; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="tool-container">
        <h2>JSON FORGE 🧩</h2>
        <textarea id="jsonInput" placeholder='{"paste": "messy JSON here"}' spellcheck="false"></textarea>
        <button onclick="formatJSON()">Beautify JSON</button>
    </div>

    <script>
        // Particles
        const cvs=document.getElementById('particleCanvas'), ctx=cvs.getContext('2d'); let pts=[]; function init(){cvs.width=innerWidth;cvs.height=innerHeight;} window.addEventListener('resize',init);init(); class P{constructor(){this.x=Math.random()*cvs.width;this.y=Math.random()*cvs.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.s=Math.random()*1.5;}draw(){ctx.fillStyle='rgba(0,242,255,0.2)';ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fill();}move(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>cvs.width)this.vx*=-1;if(this.y<0||this.y>cvs.height)this.vy*=-1;}} for(let i=0;i<100;i++)pts.push(new P()); function anim(){ctx.clearRect(0,0,cvs.width,cvs.height);pts.forEach(p=>{p.move();p.draw();});requestAnimationFrame(anim);} anim();

        // JSON Logic
        function formatJSON() {
            const input = document.getElementById('jsonInput').value;
            if(!input) return;
            try {
                const obj = JSON.parse(input);
                document.getElementById('jsonInput').value = JSON.stringify(obj, null, 4);
            } catch(e) {
                alert("Bhai, JSON syntax check kar, valid nahi hai! 🛑");
            }
        }
    </script>
</body>
</html>

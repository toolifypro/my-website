<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ToolifyPro - Free Tools</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

h1{
    margin-top:40px;
    font-size:40px;
}

p{
    color:#94a3b8;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:50px;
    flex-wrap:wrap;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:200px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card:hover{
    transform:scale(1.1);
    background:#334155;
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🚀 ToolifyPro</h1>
<p>Free Online Tools for Everyone</p>

<div class="container">

<div class="card" onclick="openTool('calculator.html')">
<div class="icon">🧮</div>
<h3>Calculator</h3>
<p>Advanced Calculator Tool</p>
</div>

</div>

<script>
function openTool(page){
    window.location.href=page;
}
</script>

</body>
</html>

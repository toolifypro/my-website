<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolifyPro | Nexus OS v2.0</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/3s3XmXh/Toolify-Pro-Iconic-T.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #00f2ff;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        header {
            padding: 1.5rem 8%; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass-border);
        }

        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }

        .brand-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px; display: flex; justify-content: center; align-items: center;
            font-weight: 800; color: white; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .logo-text {
            font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-widget {
            display: flex; justify-content: center; gap: 20px; margin-top: 40px;
        }

        .widget-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
        }

        .widget-item span {
            display: block;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .hero {
            text-align: center;
            padding: 60px 10% 20px;
        }

        .search-box {
            margin: 30px auto;
            max-width: 500px;
        }

        .search-box input {
            padding: 15px 25px;
            width: 100%;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 10%;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-decoration: none;
            color: inherit;
            text-align: center;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .icon { font-size: 3rem; margin-bottom: 20px; }
    </style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<header>
    <a href="#" class="logo-container">
        <div class="brand-icon">T</div>
        <div class="logo-text">ToolifyPro</div>
    </a>
    <div style="font-size: 0.7rem; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px;">
        NEXUS OS v2.0
    </div>
</header>

<div class="system-widget">
    <div class="widget-item"><span id="live-clock">00:00:00</span><p>System Time</p></div>
    <div class="widget-item"><span id="live-date">APR 15</span><p>Date</p></div>
</div>

<section class="hero">
    <h1>Digital Arsenal ⚡</h1>
    <div class="search-box">
        <input type="text" placeholder="Search tools...">
    </div>
</section>

<!-- 🔥 UPDATED GRID -->
<main class="grid">
    <a href="calculator.html" class="card">
        <span class="icon">🧮</span>
        <h3>Calculator</h3>
    </a>

    <a href="age.html" class="card">
        <span class="icon">📅</span>
        <h3>Age Calc</h3>
    </a>

    <a href="password.html" class="card">
        <span class="icon">🔐</span>
        <h3>Password Tool</h3>
    </a>

    <a href="ai-assistant.html" class="card">
        <span class="icon">🤖</span>
        <h3>Nexus AI</h3>
    </a>

    <!-- 💀 NEW TOOL -->
    <a href="recorder.html" class="card" style="border:1px solid var(--accent);">
        <span class="icon">🎥</span>
        <h3>Screen Recorder</h3>
    </a>
</main>

<script>
function updateClock(){
    const n=new Date();
    document.getElementById('live-clock').innerText=n.toLocaleTimeString();
    document.getElementById('live-date').innerText=n.toDateString();
}
setInterval(updateClock,1000);
</script>

</body>
</html>

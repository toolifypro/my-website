<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Speech | Nexus OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --accent: #00f2ff;
            --bg: #030712; --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        .tool-container { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 28px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); animation: fadeIn 0.8s ease; }
        h2 { font-weight: 800; margin-bottom: 25px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { width: 100%; height: 120px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; color: white; outline: none; margin-bottom: 20px; transition: 0.3s; font-family: inherit; resize: none; }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="tool-container">
        <h2>SPEECH SYNTH <span style="color:var(--accent)">🎙️</span></h2>
        <textarea id="tts-input" placeholder="Type something for Nexus to speak..."></textarea>
        <button onclick="speak()">Speak Audio</button>
    </div>

    <script>
        // Particles
        const cvs = document.getElementById('particleCanvas'), ctx = cvs.getContext('2d');
        let pts = [];
        function init() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
        window.addEventListener('resize', init); init();
        class P { constructor() { this.x=Math.random()*cvs.width; this.y=Math.random()*cvs.height; this.vx=(Math.random()-0.5)*0.5; this.vy=(Math.random()-0.5)*0.5; this.s=Math.random()*1.5; } draw() { ctx.fillStyle='rgba(0,242,255,0.2)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } move() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>cvs.width)this.vx*=-1; if(this.y<0||this.y>cvs.height)this.vy*=-1; } }
        for(let i=0;i<100;i++) pts.push(new P());
        function anim() { ctx.clearRect(0,0,cvs.width,cvs.height); pts.forEach(p=>{p.move();p.draw();}); requestAnimationFrame(anim); } anim();

        // TTS Logic
        function speak() {
            const text = document.getElementById('tts-input').value;
            if(!text) return;
            const u = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>

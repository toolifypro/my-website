<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniflix | Premium Anime Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. CSS VARIABLES & DESIGN SYSTEM
        ========================================= */
        :root {
            --bg-main: #080808;
            --bg-secondary: #141414;
            --accent-red: #E50914;
            --text-main: #FFFFFF;
            --text-muted: #BCBCBC;
            --overlay: rgba(0, 0, 0, 0.7);
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            --z-nav: 1000;
            --z-sidebar: 1001;
            --z-modal: 2000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* =========================================
           2. NAVIGATION & SIDEBAR
        ========================================= */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 4%;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            transition: background var(--transition-smooth);
            z-index: var(--z-nav);
        }

        nav.scrolled {
            background-color: var(--bg-secondary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            margin-right: 20px;
            transition: transform var(--transition-fast);
        }
        
        .menu-btn:hover { transform: scale(1.1); }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-red);
            text-decoration: none;
            letter-spacing: 1px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background-color: var(--bg-secondary);
            z-index: var(--z-sidebar);
            transition: left var(--transition-smooth);
            padding: 80px 30px 30px;
            box-shadow: 5px 0 20px rgba(0,0,0,0.8);
        }

        .sidebar.active { left: 0; }
        
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: var(--z-nav);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }
        
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .sidebar-category {
            display: block;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color var(--transition-fast);
            cursor: pointer;
        }

        .sidebar-category:hover { color: var(--text-main); }

        /* =========================================
           3. HERO SECTION
        ========================================= */
        .hero {
            position: relative;
            height: 85vh;
            width: 100%;
            background-size: cover;
            background-position: center 20%;
            display: flex;
            align-items: center;
            padding: 0 4%;
            transition: background-image 1s ease-in-out;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(8,8,8,0.9) 10%, rgba(8,8,8,0.4) 50%, transparent 100%),
                        linear-gradient(to top, var(--bg-main) 0%, transparent 20%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .hero-title {
            font-size: clamp(3rem, 5vw, 5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .match-score { color: #46d369; }
        .rating-badge { border: 1px solid rgba(255,255,255,0.4); padding: 2px 6px; border-radius: 3px; font-size: 0.9rem; }

        .hero-desc {
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 30px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-group { display: flex; gap: 15px; }

        .btn {
            padding: 12px 32px;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition-fast);
        }

        .btn-play { background: white; color: black; }
        .btn-play:hover { background: rgba(255,255,255,0.7); }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn-info:hover { background: rgba(109, 109, 110, 0.4); }

        /* =========================================
           4. CONTENT ROWS & CARDS
        ========================================= */
        .content-area {
            position: relative;
            z-index: 20;
            margin-top: -10vh;
            padding-bottom: 50px;
        }

        .row {
            margin-bottom: 40px;
            padding: 0 4%;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .slider {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px 0; /* Padding allows hover expansion without clipping */
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
        }
        
        .slider::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .card {
            flex: 0 0 calc(100% / 6 - 15px); /* 6 items per row */
            min-width: 160px;
            aspect-ratio: 2/3;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            transition: transform var(--transition-smooth);
            background-color: #222;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            transition: opacity 0.3s;
        }

        /* Hover Effect Strategy: Scale and show overlay */
        .card:hover {
            transform: scale(1.15) translateY(-5px);
            z-index: 50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 10px 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            border-radius: 0 0 6px 6px;
            opacity: 0;
            transition: opacity var(--transition-smooth);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .card:hover .card-overlay { opacity: 1; }

        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-stats {
            font-size: 0.8rem;
            color: #46d369;
            font-weight: 700;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
            background-size: 200% 100%;
            animation: skeleton-load 1.5s infinite;
        }

        @keyframes skeleton-load {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* =========================================
           5. RESPONSIVE DESIGN
        ========================================= */
        @media (max-width: 1200px) { .card { flex: 0 0 calc(100% / 5 - 15px); } }
        @media (max-width: 900px) { .card { flex: 0 0 calc(100% / 4 - 15px); } }
        @media (max-width: 600px) { 
            .card { flex: 0 0 calc(100% / 3 - 10px); }
            .hero-title { font-size: 2.5rem; }
            .btn { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav id="navbar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <a href="#" class="logo">ANIFLIX</a>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 30px; font-weight: 900; color: var(--text-main);">Browse</h2>
        <div id="categoryList">
            <a class="sidebar-category" data-genre="1">Action</a>
            <a class="sidebar-category" data-genre="4">Comedy</a>
            <a class="sidebar-category" data-genre="8">Drama</a>
            <a class="sidebar-category" data-genre="10">Fantasy</a>
            <a class="sidebar-category" data-genre="22">Romance</a>
            <a class="sidebar-category" data-genre="27">Shounen</a>
        </div>
    </aside>

    <!-- HERO SECTION -->
    <section class="hero" id="hero">
        <div class="hero-content" id="heroContent">
            <h1 class="hero-title skeleton" id="heroTitle" style="height: 60px; width: 80%; border-radius: 4px;"></h1>
            <div class="hero-meta">
                <span class="match-score" id="heroScore"></span>
                <span id="heroYear"></span>
                <span class="rating-badge" id="heroRating"></span>
            </div>
            <div class="hero-desc skeleton" id="heroDesc" style="height: 80px; width: 100%; border-radius: 4px; margin-bottom: 30px;"></div>
            <div class="btn-group">
                <button class="btn btn-play" id="heroPlay">▶ Play</button>
                <button class="btn btn-info" id="heroInfo">ⓘ More Info</button>
            </div>
        </div>
    </section>

    <!-- MAIN CONTENT ROWS -->
    <main class="content-area" id="mainContent">
        <!-- Rows will be injected here by JS -->
    </main>

    <script>
        /* =========================================
           SYSTEM ARCHITECTURE & LOGIC
        ========================================= */
        const App = (() => {
            // Configuration
            const API_BASE = 'https://api.jikan.moe/v4';
            const REQUEST_DELAY = 400; // Delay to respect Jikan's strict 3 req/sec limit
            
            // State
            let heroItems = [];
            let currentHeroIndex = 0;
            let heroInterval = null;

            // DOM Elements
            const DOM = {
                navbar: document.getElementById('navbar'),
                menuToggle: document.getElementById('menuToggle'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebarOverlay'),
                mainContent: document.getElementById('mainContent'),
                hero: {
                    section: document.getElementById('hero'),
                    content: document.getElementById('heroContent'),
                    title: document.getElementById('heroTitle'),
                    score: document.getElementById('heroScore'),
                    year: document.getElementById('heroYear'),
                    rating: document.getElementById('heroRating'),
                    desc: document.getElementById('heroDesc'),
                    playBtn: document.getElementById('heroPlay')
                }
            };

            /* --- 1. CORE UTILITIES --- */
            
            // Promise-based delay to handle API rate limiting smoothly
            const delay = (ms) => new Promise(res => setTimeout(res, ms));

            const fetchWithRetry = async (url, retries = 3) => {
                try {
                    const response = await fetch(url);
                    if (response.status === 429) throw new Error('Rate Limited');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    return data.data;
                } catch (error) {
                    if (retries > 0) {
                        console.warn(`Retrying... (${retries} attempts left)`);
                        await delay(1000);
                        return fetchWithRetry(url, retries - 1);
                    }
                    console.error("API Error:", error);
                    return [];
                }
            };

            /* --- 2. UI CONTROLLERS --- */

            const handleScroll = () => {
                if (window.scrollY > 50) DOM.navbar.classList.add('scrolled');
                else DOM.navbar.classList.remove('scrolled');
            };

            const toggleSidebar = () => {
                const isActive = DOM.sidebar.classList.contains('active');
                if (isActive) {
                    DOM.sidebar.classList.remove('active');
                    DOM.sidebarOverlay.classList.remove('active');
                } else {
                    DOM.sidebar.classList.add('active');
                    DOM.sidebarOverlay.classList.add('active');
                }
            };

            /* --- 3. HERO BANNER LOGIC --- */

            const updateHeroDOM = (anime) => {
                // Fade out content
                DOM.hero.content.style.opacity = 0;
                
                setTimeout(() => {
                    const imgUrl = anime.images.webp.large_image_url || 'https://via.placeholder.com/1920x1080?text=No+Image';
                    DOM.hero.section.style.backgroundImage = `url(${imgUrl})`;
                    
                    // Remove skeleton classes
                    DOM.hero.title.classList.remove('skeleton');
                    DOM.hero.desc.classList.remove('skeleton');
                    
                    // Reset inline styles used for skeletons
                    DOM.hero.title.style = "";
                    DOM.hero.desc.style = "";

                    DOM.hero.title.textContent = anime.title_english || anime.title;
                    DOM.hero.score.textContent = anime.score ? `${Math.round(anime.score * 10)}% Match` : 'New';
                    DOM.hero.year.textContent = anime.year || '2024';
                    DOM.hero.rating.textContent = anime.rating ? anime.rating.split(' ')[0] : 'U/A';
                    DOM.hero.desc.textContent = anime.synopsis ? anime.synopsis.split('[')[0] : 'No description available.';
                    
                    // Fade in content
                    DOM.hero.content.style.opacity = 1;
                }, 400); // Wait for fade out
            };

            const cycleHero = () => {
                if (heroItems.length === 0) return;
                currentHeroIndex = (currentHeroIndex + 1) % Math.min(5, heroItems.length);
                updateHeroDOM(heroItems[currentHeroIndex]);
            };

            const initHero = (data) => {
                heroItems = data.slice(0, 5); // Take top 5 for hero
                if (heroItems.length > 0) {
                    updateHeroDOM(heroItems[0]);
                    if (heroInterval) clearInterval(heroInterval);
                    heroInterval = setInterval(cycleHero, 7000); // Cycle every 7 seconds
                }
            };

            /* --- 4. ROW & CARD RENDERERS --- */

            const createCardHTML = (anime) => {
                const title = anime.title_english || anime.title;
                const img = anime.images.webp.large_image_url || 'https://via.placeholder.com/400x600?text=No+Image';
                const score = anime.score ? `★ ${anime.score}` : 'N/A';
                
                // Note: In a full app, onClick would trigger the modal
                return `
                    <div class="card" onclick="console.log('Open modal for: ${title}')">
                        <img src="${img}" alt="${title}" loading="lazy">
                        <div class="card-overlay">
                            <div class="card-title">${title}</div>
                            <div class="card-stats">${score}</div>
                        </div>
                    </div>
                `;
            };

            const renderRow = (title, data) => {
                if (!data || data.length === 0) return;
                
                const rowHTML = `
                    <div class="row">
                        <h2 class="row-title">${title}</h2>
                        <div class="slider">
                            ${data.map(anime => createCardHTML(anime)).join('')}
                        </div>
                    </div>
                `;
                DOM.mainContent.insertAdjacentHTML('beforeend', rowHTML);
            };

            /* --- 5. INITIALIZATION & DATA PIPELINE --- */

            const loadHomepageData = async () => {
                // Generate skeleton rows while loading
                const skeletonRow = `
                    <div class="row">
                        <h2 class="row-title skeleton" style="width:150px; height:24px; margin-bottom:15px; border-radius:4px;"></h2>
                        <div class="slider">
                            ${Array(8).fill('<div class="card skeleton"></div>').join('')}
                        </div>
                    </div>
                `;
                DOM.mainContent.innerHTML = skeletonRow.repeat(3);

                try {
                    // Fetch sequentially with delay to avoid Rate Limits (HTTP 429)
                    
                    // 1. Trending (Powers Hero and first row)
                    const trending = await fetchWithRetry(`${API_BASE}/top/anime?filter=bypopularity&limit=15`);
                    initHero(trending);
                    await delay(REQUEST_DELAY);

                    // 2. Top Rated
                    const topRated = await fetchWithRetry(`${API_BASE}/top/anime?filter=favorite&limit=15`);
                    await delay(REQUEST_DELAY);

                    // 3. Action Anime
                    const action = await fetchWithRetry(`${API_BASE}/anime?genres=1&order_by=score&sort=desc&limit=15`);
                    await delay(REQUEST_DELAY);

                    // 4. AOT / Dark Fantasy Vibe
                    const aotFans = await fetchWithRetry(`${API_BASE}/anime?q=attack on titan&limit=10`);

                    // Clear skeletons and render real data
                    DOM.mainContent.innerHTML = ''; 
                    renderRow('🔥 Trending Now', trending.slice(5)); // Skip first 5 (used in hero)
                    renderRow('🌟 Top Rated', topRated);
                    renderRow('⚔️ Action Anime', action);
                    renderRow('💀 Popular with AOT Fans', aotFans);

                } catch (error) {
                    console.error("Failed to load application data", error);
                    DOM.mainContent.innerHTML = '<h2 style="text-align:center; padding: 50px;">Unable to load data. Please refresh.</h2>';
                }
            };

            const setupEventListeners = () => {
                window.addEventListener('scroll', handleScroll);
                DOM.menuToggle.addEventListener('click', toggleSidebar);
                DOM.sidebarOverlay.addEventListener('click', toggleSidebar);
            };

            return {
                init: () => {
                    setupEventListeners();
                    loadHomepageData();
                }
            };
        })();

        // Boot App
        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolifyPro | Nexus OTT</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-87V4WX8GHQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-87V4WX8GHQ');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --netflix-red: #E50914;
            --bg-dark: #080808;
            --bg-card: #141414;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--netflix-red); }

        /* --- Navbar --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 4%;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 2000; transition: background 0.5s;
        }
        nav.scrolled { background: var(--bg-dark); border-bottom: 1px solid #222; }
        .nav-left { display: flex; align-items: center; gap: 25px; }
        .brand { font-size: 1.8rem; font-weight: 800; color: var(--netflix-red); text-decoration: none; letter-spacing: -1px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; color: white; border: none; background: none; }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed; left: -300px; top: 0; width: 300px; height: 100%;
            background: #111; z-index: 3000; transition: var(--transition);
            padding: 80px 30px; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sidebar.active { left: 0; }
        .sidebar-item { list-style: none; margin: 20px 0; font-size: 1.2rem; font-weight: 600; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .sidebar-item:hover { color: white; transform: translateX(10px); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2500; display: none; }

        /* --- Hero Slider --- */
        #hero { position: relative; height: 90vh; width: 100%; overflow: hidden; margin-bottom: 20px; }
        .slide { 
            position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; 
            display: flex; align-items: center; padding: 0 4%;
        }
        .slide.active { opacity: 1; }
        .slide-bg { position: absolute; inset: 0; z-index: -1; }
        .slide-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }
        .slide-bg::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, var(--bg-dark) 5%, transparent 50%, rgba(0,0,0,0.6) 100%); }
        
        .hero-content { max-width: 650px; transform: translateY(30px); transition: 0.8s ease; opacity: 0; }
        .slide.active .hero-content { transform: translateY(0); opacity: 1; }
        .hero-content h1 { font-size: 4rem; font-weight: 800; margin-bottom: 15px; line-height: 1.1; }
        .hero-meta { color: #46d369; font-weight: 700; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        .rating-badge { background: #333; padding: 2px 8px; border-radius: 4px; color: white; font-size: 0.8rem; }
        .hero-desc { color: var(--text-dim); line-height: 1.4; font-size: 1.1rem; margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .hero-btns { display: flex; gap: 15px; }
        .btn { padding: 12px 28px; border-radius: 4px; font-weight: 700; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 1.1rem; }
        .btn-play { background: white; color: black; }
        .btn-play:hover { background: rgba(255,255,255,0.8); }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn-info:hover { background: rgba(109, 109, 110, 0.4); }

        /* --- Content Rows --- */
        .row { padding: 20px 0 20px 4%; }
        .row-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; color: #e5e5e5; }
        .row-container { display: flex; overflow-x: auto; overflow-y: hidden; gap: 10px; padding: 20px 0; scrollbar-width: none; scroll-behavior: smooth; }
        .row-container::-webkit-scrollbar { display: none; }

        /* --- Anime Card --- */
        .card {
            flex: 0 0 auto; width: 220px; height: 320px; border-radius: 6px; overflow: hidden;
            background: var(--bg-card); position: relative; cursor: pointer;
            transition: var(--transition);
        }
        .card:hover { transform: scale(1.15); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }
        .card-info h4 { font-size: 0.9rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info .meta { font-size: 0.75rem; color: #46d369; display: flex; justify-content: space-between; }

        /* --- Skeletons --- */
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .card { width: 160px; height: 240px; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <nav id="navbar">
        <div class="nav-left">
            <button class="menu-icon" id="openMenu">☰</button>
            <a href="#" class="brand">NEXUS</a>
        </div>
    </nav>

    <aside id="sidebar">
        <ul id="categoryList">
            <li class="sidebar-item" data-genre="1">Shonen</li>
            <li class="sidebar-item" data-genre="10">Fantasy</li>
            <li class="sidebar-item" data-genre="4">Comedy</li>
            <li class="sidebar-item" data-genre="22">Romance</li>
            <li class="sidebar-item" data-genre="14">Horror</li>
            <li class="sidebar-item" data-genre="37">Supernatural</li>
        </ul>
    </aside>

    <section id="hero"></section>

    <main id="content">
        <div class="row" id="trending-row">
            <h2 class="row-title">Trending Now 🔥</h2>
            <div class="row-container" id="trending-container"></div>
        </div>
        <div class="row" id="popular-row">
            <h2 class="row-title">All-Time Popular 🌟</h2>
            <div class="row-container" id="popular-container"></div>
        </div>
        <div class="row" id="action-row">
            <h2 class="row-title">Adrenaline Rush ⚔️</h2>
            <div class="row-container" id="action-container"></div>
        </div>
    </main>

    <script>
        const API_BASE = "https://api.jikan.moe/v4";
        const state = {
            heroAnimes: [],
            currentSlide: 0
        };

        // --- Core Functions ---

        async function init() {
            setupEventListeners();
            showSkeletons();
            
            // Load Hero
            const top = await fetchData("/top/anime?limit=5");
            state.heroAnimes = top.data;
            renderHero();
            startHeroTimer();

            // Load Rows sequentially (avoiding rate limit)
            await loadRow("/seasons/now", "trending-container");
            await loadRow("/top/anime?filter=bypopularity", "popular-container");
            await loadRow("/anime?genres=1&order_by=score&sort=desc", "action-container");
        }

        async function fetchData(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                return { data: [] };
            }
        }

        function renderHero() {
            const heroSection = document.getElementById('hero');
            heroSection.innerHTML = state.heroAnimes.map((anime, index) => `
                <div class="slide ${index === 0 ? 'active' : ''}">
                    <div class="slide-bg">
                        <img src="${anime.images.webp.large_image_url}" alt="">
                    </div>
                    <div class="hero-content">
                        <div class="hero-meta">
                            <span class="rating-badge">TOP RATED</span>
                            <span>${anime.year || '2024'}</span>
                            <span style="color:white">${anime.episodes} Episodes</span>
                        </div>
                        <h1>${anime.title_english || anime.title}</h1>
                        <p class="hero-desc">${anime.synopsis || 'Loading description...'}</p>
                        <div class="hero-btns">
                            <a href="${anime.url}" target="_blank" class="btn btn-play">▶ Play</a>
                            <a href="${anime.url}" target="_blank" class="btn btn-info">ⓘ More Info</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadRow(endpoint, containerId) {
            const container = document.getElementById(containerId);
            const res = await fetchData(endpoint);
            container.innerHTML = ''; // Clear skeletons
            
            res.data.forEach(anime => {
                container.appendChild(createCard(anime));
            });
            // Buffer time to prevent Jikan 429 Error
            await new Promise(r => setTimeout(r, 500));
        }

        function createCard(anime) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${anime.images.webp.image_url}" loading="lazy" alt="${anime.title}">
                <div class="card-info">
                    <h4>${anime.title}</h4>
                    <div class="meta">
                        <span>⭐ ${anime.score || 'N/A'}</span>
                        <span>${anime.type}</span>
                    </div>
                </div>
            `;
            card.onclick = () => window.open(anime.url, '_blank');
            return card;
        }

        // --- UI Logic ---

        function setupEventListeners() {
            const nav = document.getElementById('navbar');
            const openMenu = document.getElementById('openMenu');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            window.onscroll = () => {
                if (window.scrollY > 50) nav.classList.add('scrolled');
                else nav.classList.remove('scrolled');
            };

            openMenu.onclick = () => {
                sidebar.classList.add('active');
                overlay.style.display = 'block';
            };

            overlay.onclick = () => {
                sidebar.classList.remove('active');
                overlay.style.display = 'none';
            };

            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.onclick = async () => {
                    const genreId = item.dataset.genre;
                    const container = document.getElementById('trending-container');
                    document.getElementById('trending-row').querySelector('.row-title').innerText = item.innerText + " Anime";
                    container.innerHTML = '<div class="skeleton" style="width:200px; height:300px"></div>'.repeat(5);
                    sidebar.classList.remove('active');
                    overlay.style.display = 'none';
                    await loadRow(`/anime?genres=${genreId}`, 'trending-container');
                };
            });
        }

        function startHeroTimer() {
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[state.currentSlide].classList.remove('active');
                state.currentSlide = (state.currentSlide + 1) % slides.length;
                slides[state.currentSlide].classList.add('active');
            }, 6000);
        }

        function showSkeletons() {
            const containers = ['trending-container', 'popular-container', 'action-container'];
            containers.forEach(id => {
                const c = document.getElementById(id);
                c.innerHTML = '<div class="card skeleton"></div>'.repeat(6);
            });
        }

        init();
    </script>
</body>
</html>

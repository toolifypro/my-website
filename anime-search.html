<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OTT | Ultimate Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #E50914;
            --bg: #050505;
            --card-bg: #141414;
            --text: #ffffff;
            --text-dim: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- Global UI --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 25px 5%;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 2000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }
        .logo { color: var(--accent); font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; text-decoration: none; }

        /* --- Hero: Ultra Quality & Visibility --- */
        .hero { height: 100vh; position: relative; display: flex; align-items: center; padding: 0 5%; overflow: hidden; background: #000; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide.active { opacity: 1; }
        
        /* Forced High Quality Image */
        .slide img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        
        /* Stronger Vignette for Text Visibility */
        .slide::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(77deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0) 80%),
                        linear-gradient(0deg, var(--bg) 0%, transparent 60%);
        }

        .hero-content { position: relative; max-width: 850px; z-index: 10; margin-top: 100px; transform: translateY(30px); opacity: 0; transition: 1s 0.5s; }
        .slide.active .hero-content { transform: translateY(0); opacity: 1; }
        
        .meta { font-size: 1rem; letter-spacing: 3px; color: #46d369; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        .hero h1 { 
            font-size: 5.5rem; font-weight: 900; letter-spacing: -3px; line-height: 0.9; 
            margin-bottom: 25px; text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .hero p { color: #ccc; font-size: 1.25rem; margin-bottom: 40px; max-width: 600px; line-height: 1.5; font-weight: 400; }
        
        .hero-btns { display: flex; gap: 20px; }
        .btn { 
            padding: 15px 40px; font-weight: 800; border-radius: 6px; border: none; cursor: pointer; 
            font-size: 1.2rem; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .btn-primary { background: white; color: black; }
        .btn-primary:hover { background: #e6e6e6; transform: scale(1.05); }
        .btn-secondary { background: rgba(109, 109, 110, 0.7); color: white; backdrop-filter: blur(10px); }
        .btn-secondary:hover { background: rgba(109, 109, 110, 0.4); }

        /* --- Content Layout --- */
        .row { padding: 50px 0 20px 5%; }
        .row h2 { font-size: 1.8rem; margin-bottom: 20px; color: #fff; font-weight: 600; }
        .row-inner { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        
        .card {
            min-width: 250px; height: 375px; border-radius: 8px; overflow: hidden;
            position: relative; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            background: #111;
        }
        .card:hover { transform: scale(1.18); z-index: 100; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 25px;
            opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }
        .card-info h4 { font-size: 1rem; margin-bottom: 10px; font-weight: 700; }
        
        .watch-btn {
            background: var(--accent); color: white; border: none; padding: 10px; 
            border-radius: 4px; font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        /* --- Loading States --- */
        .skeleton { background: #1a1a1a; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .card { min-width: 180px; height: 270px; }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <a href="#" class="logo">NEXUS</a>
</nav>

<section id="hero" class="hero"></section>
<main id="content-rows"></main>

<script>
    const WORKER_URL = 'https://workerjs.yashrajsharma159.workers.dev';
    const JIKAN_API = 'https://api.jikan.moe/v4';
    let hIndex = 0;

    // --- The Real Watch Function ---
    async function watchAnime(title, btn) {
        const original = btn.innerHTML;
        btn.innerHTML = "🔍 Locating Server...";
        btn.style.opacity = "0.7";

        try {
            const res = await fetch(`${WORKER_URL}?q=${encodeURIComponent(title)}`);
            const data = await res.json();

            // Checking for a real link in results
            if (data.results && data.results[0]?.link) {
                window.open(data.results[0].link, '_blank');
            } else {
                // Fallback if worker fails to scrape
                alert("Source finding failed. Trying secondary server...");
                window.open(`https://aniwatchtv.to/search?keyword=${encodeURIComponent(title)}`, '_blank');
            }
        } catch (e) {
            alert("Connection error with Backend.");
        } finally {
            btn.innerHTML = original;
            btn.style.opacity = "1";
        }
    }

    async function fetchJikan(endpoint) {
        await new Promise(r => setTimeout(r, 400));
        const res = await fetch(JIKAN_API + endpoint);
        const json = await res.json();
        return json.data || [];
    }

    function renderHero(list) {
        const hero = document.getElementById('hero');
        hero.innerHTML = list.map((a, i) => {
            // Quality Check: Force Large Webp
            const img = a.images.webp.large_image_url || a.images.jpg.large_image_url;
            return `
            <div class="slide ${i === 0 ? 'active' : ''}">
                <img src="${img}" alt="">
                <div class="hero-content">
                    <div class="meta">TRENDING #1 • ⭐ ${a.score || '8.8'} • ${a.type}</div>
                    <h1>${a.title_english || a.title}</h1>
                    <p>${a.synopsis ? a.synopsis.slice(0, 180) + '...' : 'Explore the latest episodes of this top-rated anime series.'}</p>
                    <div class="hero-btns">
                        <button class="btn btn-primary" onclick="watchAnime('${a.title}', this)">▶ Play Now</button>
                        <button class="btn btn-secondary" onclick="window.open('${a.url}', '_blank')">ⓘ More Info</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if(!slides.length) return;
            slides[hIndex].classList.remove('active');
            hIndex = (hIndex + 1) % slides.length;
            slides[hIndex].classList.add('active');
        }, 7000);
    }

    function renderRow(title, data) {
        const root = document.getElementById('content-rows');
        const section = document.createElement('section');
        section.className = 'row';
        section.innerHTML = `
            <h2>${title}</h2>
            <div class="row-inner">
                ${data.map(a => `
                    <div class="card" onclick="watchAnime('${a.title}', this)">
                        <img src="${a.images.webp.large_image_url || a.images.jpg.large_image_url}" loading="lazy">
                        <div class="card-info">
                            <h4>${a.title}</h4>
                            <button class="watch-btn">Watch Now</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        root.appendChild(section);
    }

    async function init() {
        const trending = await fetchJikan('/top/anime?filter=airing&limit=15');
        renderHero(trending.slice(0, 5));
        renderRow('🔥 Airing Now', trending);

        const popular = await fetchJikan('/top/anime?filter=bypopularity&limit=15');
        renderRow('🇮🇳 Popular in India', popular);
    }

    window.onscroll = () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 50) nav.style.background = "#050505";
        else nav.style.background = "linear-gradient(to bottom, rgba(0,0,0,0.9), transparent)";
    };

    init();
</script>
</body>
</html>

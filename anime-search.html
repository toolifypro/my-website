<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DubsWatcher | Premium OTT Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nf-red: #E50914;
            --nf-black: #080808;
            --nf-dark: #141414;
            --glass: rgba(0, 0, 0, 0.7);
            --transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            --neon-glow: 0 0 15px rgba(229, 9, 20, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--nf-black); color: white; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            transition: 0.3s;
        }
        nav.scrolled { background: var(--nf-black); }

        .logo { font-size: 2rem; font-weight: 800; color: var(--nf-red); text-decoration: none; }

        .search-box { position: relative; width: 300px; }
        .search-input {
            width: 100%; padding: 10px 20px; border-radius: 4px;
            background: rgba(0,0,0,0.75); border: 1px solid #333;
            color: white; outline: none;
        }
        
        /* Search Suggestions */
        .suggestions {
            position: absolute; top: 110%; width: 100%;
            background: var(--nf-dark); border-radius: 4px;
            display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .suggestion-item {
            padding: 10px; border-bottom: 1px solid #222; cursor: pointer;
            display: flex; align-items: center; gap: 10px; font-size: 0.8rem;
        }
        .suggestion-item:hover { background: #222; }

        /* --- HERO BANNER --- */
        .hero {
            height: 85vh; width: 100%; position: relative;
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 5%;
            animation: fadeIn 1s ease;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, transparent 60%),
                        linear-gradient(to top, var(--nf-black) 0%, transparent 30%);
        }
        .hero-content { position: relative; max-width: 600px; z-index: 10; }
        .hero-title { font-size: 4rem; font-weight: 800; margin-bottom: 10px; line-height: 1.1; }
        .hero-meta { color: #46d369; font-weight: 600; margin-bottom: 20px; display: flex; gap: 15px; }
        .hero-desc { font-size: 1.1rem; line-height: 1.5; color: #ccc; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 15px; }
        .btn {
            padding: 12px 30px; border-radius: 4px; font-weight: 800;
            text-decoration: none; display: flex; align-items: center; gap: 10px;
            cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-white { background: white; color: black; }
        .btn-grey { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn:hover { opacity: 0.8; }

        /* --- CONTENT ROWS --- */
        .main-content { margin-top: -100px; position: relative; z-index: 20; padding-bottom: 50px; }
        .row-container { padding: 20px 0 20px 5%; overflow: hidden; }
        .row-title { font-size: 1.5vw; color: #e5e5e5; margin-bottom: 15px; }
        .row-inner {
            display: flex; gap: 10px; overflow-x: scroll; padding: 20px 0;
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .row-inner::-webkit-scrollbar { display: none; }

        /* --- CARD HOVER EXPANSION --- */
        .card {
            flex: 0 0 240px; aspect-ratio: 16/9; position: relative;
            border-radius: 4px; cursor: pointer; transition: var(--transition);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        
        .card:hover {
            transform: scale(1.4); z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .card-info {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: var(--nf-dark); padding: 15px; border-radius: 0 0 4px 4px;
            display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card:hover .card-info { display: block; }
        
        .badge {
            font-size: 0.6rem; padding: 2px 5px; border: 1px solid #666;
            margin-right: 5px; border-radius: 2px;
        }
        .badge-hd { color: white; border-color: white; }
        .badge-platform { background: var(--nf-red); border: none; }

        /* --- ADVANCED MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: 0.4s; padding: 20px;
        }
        .modal.active { display: flex; opacity: 1; }
        .modal-content {
            background: var(--nf-dark); width: 100%; max-width: 800px;
            border-radius: 10px; overflow: hidden; position: relative;
            transform: translateY(50px); transition: 0.4s;
        }
        .modal.active .modal-content { transform: translateY(0); }
        .modal-banner { height: 400px; background-size: cover; position: relative; }
        .modal-banner::after {
            content: ''; position: absolute; bottom: 0; width: 100%; height: 100px;
            background: linear-gradient(to top, var(--nf-dark), transparent);
        }
        .modal-details { padding: 40px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        
        .platform-tag {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700; margin-bottom: 10px;
        }
        .premium { background: #ffd700; color: black; }
        .free { background: #46d369; color: white; }

        /* --- SKELETON --- */
        .skeleton { background: #222; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .card { flex: 0 0 160px; }
            .modal-details { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <a href="#" class="logo">DUBS WATCHER</a>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Titles, characters, genres">
            <div id="suggestionBox" class="suggestions"></div>
        </div>
    </nav>

    <section id="hero" class="hero">
        <div class="hero-content">
            <h1 id="heroTitle" class="hero-title">Loading...</h1>
            <div class="hero-meta">
                <span id="heroMatch">98% Match</span>
                <span id="heroYear">2024</span>
                <span class="badge">U/A 16+</span>
            </div>
            <p id="heroDesc" class="hero-desc">Experience the ultimate anime discovery platform with real-time updates and multi-platform availability.</p>
            <div class="btn-group">
                <button class="btn btn-white">▶ Play</button>
                <button class="btn btn-grey" onclick="openRandomModal()">ⓘ More Info</button>
            </div>
        </div>
    </section>

    <div class="main-content">
        <div class="row-container">
            <h2 class="row-title">🎯 Your Search Results</h2>
            <div id="searchRow" class="row-inner">
                <!-- Cards injected here -->
            </div>
        </div>

        <div class="row-container">
            <h2 class="row-title">🔥 Trending Now</h2>
            <div id="trendingRow" class="row-inner">
                <!-- Skeletons -->
            </div>
        </div>
    </div>

    <!-- Netflix Modal -->
    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <div id="modalBanner" class="modal-banner"></div>
            <div class="modal-details">
                <div>
                    <div id="modalPlatform" class="platform-tag"></div>
                    <h2 id="modalTitle" style="font-size: 2rem; margin-bottom: 15px;"></h2>
                    <p id="modalDesc" style="color: #bcbcbc; line-height: 1.6;"></p>
                </div>
                <div>
                    <p style="color: #777; margin-bottom: 10px;">Languages:</p>
                    <div id="modalLangs"></div>
                    <br>
                    <a href="#" id="modalWatchBtn" target="_blank" class="btn btn-white" style="justify-content: center;">Watch Now</a>
                </div>
            </div>
        </div>
    </div>

  <script>

// 🔥 PLATFORM ENGINE (SMART SYSTEM)
const PlatformEngine = (() => {
    const ANIME_REGISTRY = {
        "naruto": ["Crunchyroll", "Netflix"],
        "one piece": ["Crunchyroll", "Netflix"],
        "demon slayer": ["Netflix", "Crunchyroll"],
        "jujutsu kaisen": ["Crunchyroll", "Netflix"],
        "attack on titan": ["Crunchyroll", "Hulu"],
        "death note": ["Netflix", "YouTube"]
    };

    const PLATFORM_META = {
        "Netflix": { type: "premium", color: "#E50914" },
        "Crunchyroll": { type: "premium", color: "#F47521" },
        "Hulu": { type: "premium", color: "#3DBB3D" },
        "YouTube": { type: "free", color: "#FF0000" }
    };

    const normalize = (t) => t.toLowerCase().replace(/\(.*?\)|dub|hindi|season \d+/gi,'').trim();

    const detect = (title) => {
        const clean = normalize(title);

        for (let key in ANIME_REGISTRY) {
            if (clean.includes(key)) {
                return ANIME_REGISTRY[key].map(name => ({
                    name,
                    ...PLATFORM_META[name]
                }));
            }
        }

        // fallback
        return [{ name: "YouTube", type: "free", color: "#FF0000" }];
    };

    return { detect };
})();


// --- EXISTING CODE ---
const WORKER_URL = "https://workerjs.yashrajsharma159.workers.dev?q=";
const JIKAN_TOP = "https://api.jikan.moe/v4/top/anime?limit=15";

let trendingData = [];

// NAV scroll
window.addEventListener('scroll', () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 50) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
});

document.addEventListener('DOMContentLoaded', () => {
    fetchTrending();
});

// SEARCH
const searchInput = document.getElementById('searchInput');
const suggestionBox = document.getElementById('suggestionBox');

searchInput.addEventListener('input', async (e) => {
    const query = e.target.value.trim();
    if (query.length < 3) {
        suggestionBox.style.display = 'none';
        return;
    }

    suggestionBox.style.display = 'block';
    suggestionBox.innerHTML = 'Searching...';
    
    const res = await fetch(WORKER_URL + encodeURIComponent(query));
    const data = await res.json();

    renderSuggestions(data.results);
    renderRow(data.results, 'searchRow');
});

function renderSuggestions(list) {
    suggestionBox.innerHTML = list.slice(0,5).map(item => `
        <div class="suggestion-item">${item.title}</div>
    `).join('');
}

// TRENDING
async function fetchTrending() {
    const row = document.getElementById('trendingRow');
    row.innerHTML = 'Loading...';

    const res = await fetch(JIKAN_TOP);
    const data = await res.json();
    trendingData = data.data;

    renderRow(trendingData, 'trendingRow', true);
    setHero(trendingData[0]);
}

function setHero(anime) {
    const hero = document.getElementById('hero');
    hero.style.backgroundImage = `url(${anime.images.jpg.large_image_url})`;
    document.getElementById('heroTitle').innerText = anime.title;
}

// 🎯 UPDATED CARD RENDER
function renderRow(data, rowId, isJikan = false) {
    const row = document.getElementById(rowId);

    row.innerHTML = data.map(anime => {
        const title = anime.title;
        const img = isJikan 
            ? anime.images.jpg.large_image_url 
            : `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=141414&color=E50914`;

        // 🔥 NEW PLATFORM ENGINE
        const platforms = PlatformEngine.detect(title);

        const badges = platforms.map(p => `
            <span class="badge" style="background:${p.type==='premium'?p.color:'#46d369'}">
                ${p.type==='premium' ? '⭐' : '🔓'} ${p.name}
            </span>
        `).join('');

        return `
            <div class="card" onclick="showAnimeDetails('${btoa(JSON.stringify(anime))}', ${isJikan})">
                <img src="${img}">
                <div class="card-info">
                    <div>${badges}</div>
                    <div style="font-size:0.8rem;font-weight:700;">${title}</div>
                </div>
            </div>
        `;
    }).join('');
}


// 🎯 UPDATED MODAL
function showAnimeDetails(encodedData, isJikan) {
    const anime = JSON.parse(atob(encodedData));
    const modal = document.getElementById('modal');

    const platforms = PlatformEngine.detect(anime.title);

    document.getElementById('modalBanner').style.backgroundImage =
        `url(${isJikan ? anime.images.jpg.large_image_url : ''})`;

    document.getElementById('modalTitle').innerText = anime.title;

    // 🔥 MULTIPLE PLATFORM BADGES
    document.getElementById('modalPlatform').innerHTML =
        platforms.map(p => `
            <span class="platform-tag ${p.type}">
                ${p.type==='premium'?'⭐':'🔓'} ${p.name}
            </span>
        `).join('');

    document.getElementById('modalWatchBtn').href =
        isJikan ? anime.url : anime.link;

    modal.classList.add('active');
}

function closeModal(e) {
    if (e.target.id === 'modal') {
        document.getElementById('modal').classList.remove('active');
    }
}

</script>
</body>
</html>

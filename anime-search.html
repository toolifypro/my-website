<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OTT Ultra | ToolifyPro</title>
    
    <!-- Google Analytics (Preserved) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-87V4WX8GHQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-87V4WX8GHQ');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #E50914;
            --bg: #080808;
            --card-bg: #141414;
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- UI Polish --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 2000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            transition: 0.4s;
        }
        nav.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--accent); font-size: 2rem; font-weight: 900; letter-spacing: -1.5px; text-decoration: none; }
        .menu-btn { cursor: pointer; font-size: 1.5rem; background: none; border: none; color: white; }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 300px; height: 100%;
            background: #000; padding: 100px 40px; transition: var(--transition);
            z-index: 3000; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar div { margin: 15px 0; color: var(--text-dim); cursor: pointer; font-weight: 600; transition: 0.3s; }
        .sidebar div:hover { color: white; transform: translateX(10px); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 2500; backdrop-filter: blur(4px); }

        /* --- Hero: Premium Typography --- */
        .hero { height: 95vh; position: relative; display: flex; align-items: center; padding: 0 5%; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1.2s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(77deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 85%),
                        linear-gradient(0deg, var(--bg) 0%, transparent 50%);
        }

        .hero-content { position: relative; max-width: 800px; z-index: 2; }
        .meta { font-size: 0.85rem; letter-spacing: 2px; color: #46d369; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }
        .hero h1 { 
            font-size: 5rem; font-weight: 900; letter-spacing: -2px; line-height: 0.95; 
            margin-bottom: 20px; text-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .hero p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 30px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .hero-btns { display: flex; gap: 15px; }
        .btn { padding: 12px 30px; font-weight: 800; border-radius: 4px; border: none; cursor: pointer; font-size: 1.1rem; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .btn-primary { background: white; color: black; }
        .btn-primary:hover { background: rgba(255,255,255,0.8); transform: scale(1.05); }
        .btn-secondary { background: rgba(109, 109, 110, 0.7); color: white; }

        /* --- Rows & Cards --- */
        .row { padding: 40px 0 20px 5%; }
        .row h2 { margin-bottom: 20px; font-size: 1.6rem; font-weight: 600; }
        .row-inner { display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; scroll-behavior: smooth; }
        .row-inner::-webkit-scrollbar { display: none; }

        .card {
            min-width: 220px; height: 320px; border-radius: 4px; overflow: hidden;
            position: relative; transition: var(--transition); cursor: pointer;
        }
        .card:hover { transform: scale(1.2); z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,1), transparent 70%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }
        .card-info h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; }
        .rating { font-size: 0.75rem; color: #46d369; font-weight: 800; }

        .watch-btn {
            margin-top: 10px; padding: 8px; font-size: 0.75rem; font-weight: 800;
            background: white; color: black; border: none; border-radius: 3px; cursor: pointer;
            transition: 0.2s;
        }
        .watch-btn:hover { background: var(--accent); color: white; }

        /* --- Skeletons --- */
        .skeleton { background: #1a1a1a; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .card { min-width: 160px; height: 240px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav id="navbar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <a href="#" class="logo">NEXUS</a>
    </div>
</nav>

<aside id="sidebar" class="sidebar">
    <div onclick="filterGenre(1, 'Shonen')">Shonen</div>
    <div onclick="filterGenre(10, 'Fantasy')">Fantasy</div>
    <div onclick="filterGenre(4, 'Comedy')">Comedy</div>
    <div onclick="filterGenre(22, 'Romance')">Romance</div>
    <div onclick="filterGenre(14, 'Horror')">Horror</div>
</aside>

<section id="hero" class="hero"></section>
<main id="content-rows"></main>

<script>
const API = 'https://api.jikan.moe/v4';
const WORKER = 'https://workerjs.yashrajsharma159.workers.dev';
let heroIndex = 0;

// 🔥 Safe Image Handler
function getImage(a) {
    return a?.images?.webp?.large_image_url || 
           a?.images?.jpg?.large_image_url || 
           'https://via.placeholder.com/500x750?text=No+Poster';
}

// 🎬 Worker Streaming Logic
async function playAnime(title, btn) {
    const originalText = btn.innerText;
    btn.innerText = "⚡ Loading...";
    
    try {
        const res = await fetch(`${WORKER}?q=${encodeURIComponent(title)}`);
        const data = await res.json();

        if(data.results && data.results.length) {
            window.open(data.results[0].link, '_blank');
        } else {
            alert('Not found! Hum isey jaldi add karenge.');
        }
    } catch(e) {
        alert('Server Error. Apne backend worker ko check karo!');
    } finally {
        btn.innerText = originalText;
    }
}

// 🎯 Smart Fetch with Rate Limiting
async function fetchAnime(endpoint) {
    await new Promise(r => setTimeout(r, 400)); // Prevent 429 errors
    const res = await fetch(API + endpoint);
    const data = await res.json();
    return data.data || [];
}

// 🎬 Premium Hero Render
function renderHero(list) {
    const hero = document.getElementById('hero');
    hero.innerHTML = list.map((a, i) => `
        <div class="slide ${i === 0 ? 'active' : ''}">
            <img src="${getImage(a)}">
            <div class="hero-content">
                <div class="meta">⭐ ${a.score || '8.5'} • ${a.year || '2024'} • ${a.type}</div>
                <h1>${a.title_english || a.title}</h1>
                <p>${(a.synopsis || '').slice(0, 180)}...</p>
                <div class="hero-btns">
                    <button class="btn btn-primary" onclick="playAnime('${a.title}', this)">▶ Play</button>
                    <button class="btn btn-secondary" onclick="window.open('${a.url}')">ⓘ More Info</button>
                </div>
            </div>
        </div>
    `).join('');

    setInterval(() => {
        const slides = document.querySelectorAll('.slide');
        if(!slides.length) return;
        slides[heroIndex].classList.remove('active');
        heroIndex = (heroIndex + 1) % slides.length;
        slides[heroIndex].classList.add('active');
    }, 6000);
}

// 🎴 Netflix-style Card
function createCard(a) {
    return `
    <div class="card">
        <img src="${getImage(a)}" loading="lazy">
        <div class="card-info">
            <span class="rating">⭐ ${a.score || 'N/A'}</span>
            <h4>${a.title}</h4>
            <button class="watch-btn" onclick="playAnime('${a.title}', this)">▶ Watch Now</button>
        </div>
    </div>`;
}

function renderRow(title, data) {
    const root = document.getElementById('content-rows');
    const section = document.createElement('section');
    section.className = 'row';
    section.innerHTML = `
        <h2>${title}</h2>
        <div class="row-inner">${data.map(createCard).join('')}</div>
    `;
    root.appendChild(section);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    const overlay = document.getElementById('overlay');
    overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
}

async function filterGenre(id, name) {
    toggleSidebar();
    const root = document.getElementById('content-rows');
    root.innerHTML = `<div class="row"><h2>Filtering ${name}...</h2><div class="row-inner">${Array(6).fill('<div class="card skeleton"></div>').join('')}</div></div>`;
    
    const data = await fetchAnime(`/anime?genres=${id}&order_by=score&sort=desc`);
    root.innerHTML = '';
    renderRow(`${name} Hits`, data);
}

// 🚀 Start The Platform
async function init() {
    // Show Loading
    document.getElementById('content-rows').innerHTML = `<div class="row"><div class="row-inner">${Array(6).fill('<div class="card skeleton"></div>').join('')}</div></div>`;

    const trending = await fetchAnime('/top/anime?filter=airing');
    renderHero(trending.slice(0, 5));
    
    document.getElementById('content-rows').innerHTML = ''; 
    renderRow('🔥 Trending Now', trending);

    const india = await fetchAnime('/top/anime?filter=bypopularity');
    renderRow('🇮🇳 Popular in India', india);

    const action = await fetchAnime('/anime?genres=1&order_by=score&sort=desc');
    renderRow('⚔️ Action Packed', action);

    const aotFans = await fetchAnime('/anime?q=attack&order_by=score');
    renderRow('💀 Popular with AOT Fans', aotFans);
}

window.onscroll = () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 100) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
};

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OTT Ultra | ToolifyPro</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-87V4WX8GHQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-87V4WX8GHQ');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #E50914;
            --bg: #080808;
            --card-bg: #141414;
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --glass: rgba(20, 20, 20, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.5; }

        /* --- UI Components --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 2000; transition: 0.5s;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
        }
        nav.scrolled { background: var(--bg); border-bottom: 1px solid #222; }
        .logo { color: var(--accent); font-size: 2rem; font-weight: 800; letter-spacing: -1.5px; text-decoration: none; }
        .nav-tools { display: flex; align-items: center; gap: 20px; }
        .menu-btn { cursor: pointer; font-size: 1.5rem; background: none; border: none; color: white; transition: 0.3s; }
        .menu-btn:hover { color: var(--accent); }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 300px; height: 100%;
            background: #000; padding: 100px 40px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar h3 { color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .sidebar div { margin: 15px 0; color: var(--text-dim); cursor: pointer; font-weight: 500; font-size: 1.1rem; transition: 0.3s; }
        .sidebar div:hover { color: white; transform: translateX(8px); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 2500; backdrop-filter: blur(4px); }

        /* --- Hero Section --- */
        .hero { height: 95vh; position: relative; display: flex; align-items: center; padding: 0 5%; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1.2s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Netflix Vignette Effect */
        .slide::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(77deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 85%),
                        linear-gradient(0deg, var(--bg) 0%, transparent 40%);
        }

        .hero-content { position: relative; max-width: 650px; z-index: 2; transform: translateY(20px); opacity: 0; transition: 0.8s 0.5s; }
        .slide.active .hero-content { transform: translateY(0); opacity: 1; }
        .hero-content h1 { font-size: 4.5rem; font-weight: 800; line-height: 1; margin-bottom: 20px; }
        .hero-content p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .hero-btns { display: flex; gap: 15px; }
        .btn { 
            padding: 12px 30px; font-weight: 700; border-radius: 4px; border: none; cursor: pointer; 
            font-size: 1.1rem; display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-primary { background: white; color: black; }
        .btn-primary:hover { background: rgba(255,255,255,0.7); }
        .btn-secondary { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn-secondary:hover { background: rgba(109, 109, 110, 0.4); }

        /* --- Rows & Cards --- */
        .row { padding: 30px 0 30px 5%; }
        .row h2 { margin-bottom: 15px; font-size: 1.4rem; font-weight: 600; color: #e5e5e5; }
        .row-inner { display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; scroll-behavior: smooth; }
        .row-inner::-webkit-scrollbar { display: none; }

        .card {
            min-width: 220px; height: 320px; border-radius: 4px; overflow: hidden;
            position: relative; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .card:hover { transform: scale(1.15); z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        
        .card-info {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
            opacity: 0; transition: 0.3s;
        }
        .card:hover .card-info { opacity: 1; }
        .card-info h4 { font-size: 0.9rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info .rating { color: #46d369; font-weight: 700; font-size: 0.8rem; }

        /* --- Skeleton Loading --- */
        .skeleton { background: #1a1a1a; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimme 1.5s infinite;
        }
        @keyframes shimme { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        footer { padding: 60px 5%; border-top: 1px solid #222; text-align: center; color: var(--text-dim); font-size: 0.8rem; }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .card { min-width: 160px; height: 240px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav id="navbar">
    <div class="nav-left" style="display: flex; align-items: center; gap: 20px;">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <a href="#" class="logo">NEXUS</a>
    </div>
    <div class="nav-tools">
        <span style="font-size: 0.8rem; font-weight: 800; border: 1px solid white; padding: 2px 5px; border-radius: 3px;">ULTRA</span>
    </div>
</nav>

<aside id="sidebar" class="sidebar">
    <h3>Categories</h3>
    <div onclick="filterGenre(1, 'Shonen')">Shonen</div>
    <div onclick="filterGenre(10, 'Fantasy')">Fantasy</div>
    <div onclick="filterGenre(4, 'Comedy')">Comedy</div>
    <div onclick="filterGenre(22, 'Romance')">Romance</div>
    <div onclick="filterGenre(14, 'Horror')">Horror</div>
    <div onclick="filterGenre(37, 'Supernatural')">Supernatural</div>
</aside>

<section id="hero" class="hero"></section>

<main id="content-rows"></main>

<footer>
    <p>NEXUS OTT v4.0 &bull; Built for ToolifyPro &bull; 2026</p>
</footer>

<script>
const API = 'https://api.jikan.moe/v4';
let cache = new Map();
let index = 0;

// Optimized Fetch with Rate Limit Delay
async function fetchData(endpoint) {
    if (cache.has(endpoint)) return cache.get(endpoint);
    await new Promise(r => setTimeout(r, 400)); // Rate limit buffer
    try {
        const res = await fetch(API + endpoint);
        const data = await res.json();
        cache.set(endpoint, data.data);
        return data.data;
    } catch { return []; }
}

function renderHero(heroData) {
    const hero = document.getElementById('hero');
    hero.innerHTML = heroData.map((a, i) => `
        <div class="slide ${i === 0 ? 'active' : ''}">
            <img src="${a.images.webp.large_image_url}">
            <div class="hero-content">
                <h1>${a.title_english || a.title}</h1>
                <p>${a.synopsis || 'No description available for this masterpiece.'}</p>
                <div class="hero-btns">
                    <button class="btn btn-primary" onclick="window.open('${a.url}')">▶ Play</button>
                    <button class="btn btn-secondary" onclick="window.open('${a.url}')">ⓘ More Info</button>
                </div>
            </div>
        </div>`).join('');
    
    startHeroTimer();
}

function startHeroTimer() {
    setInterval(() => {
        const slides = document.querySelectorAll('.slide');
        if(!slides.length) return;
        slides[index].classList.remove('active');
        index = (index + 1) % slides.length;
        slides[index].classList.add('active');
    }, 6000);
}

function createCard(a) {
    return `
    <div class="card" onclick="window.open('${a.url}')">
        <img src="${a.images.webp.image_url}" loading="lazy" alt="${a.title}">
        <div class="card-info">
            <span class="rating">⭐ ${a.score || '8.5'}</span>
            <h4>${a.title}</h4>
        </div>
    </div>`;
}

function renderRow(title, data) {
    const container = document.getElementById('content-rows');
    const section = document.createElement('section');
    section.className = 'row';
    section.innerHTML = `
        <h2>${title}</h2>
        <div class="row-inner">${data.map(createCard).join('')}</div>
    `;
    container.appendChild(section);
}

function showSkeletons() {
    const container = document.getElementById('content-rows');
    container.innerHTML = `
        <div class="row">
            <div class="skeleton" style="width: 200px; height: 30px; margin-bottom: 20px; border-radius: 4px;"></div>
            <div class="row-inner">
                ${Array(6).fill('<div class="card skeleton"></div>').join('')}
            </div>
        </div>
    `;
}

async function init() {
    showSkeletons();
    
    // Sequential fetching to keep the API happy
    const trending = await fetchData('/top/anime?filter=airing');
    renderHero(trending.slice(0, 5));
    
    document.getElementById('content-rows').innerHTML = ''; // Clear Skeletons
    
    renderRow('🔥 Trending Now', trending);
    
    const popular = await fetchData('/top/anime?filter=bypopularity');
    renderRow('🇮🇳 Popular in India', popular);
    
    const action = await fetchData('/anime?genres=1&order_by=score&sort=desc');
    renderRow('⚔️ Action Packed', action);

    const topRated = await fetchData('/top/anime?filter=favorite');
    renderRow('🌟 All Time Classics', topRated);
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('overlay');
    const isActive = sb.classList.contains('active');
    
    sb.classList.toggle('active');
    ov.style.display = isActive ? 'none' : 'block';
}

async function filterGenre(id, name) {
    toggleSidebar();
    const container = document.getElementById('content-rows');
    container.innerHTML = `<div class="row"><h2>Filtering ${name}...</h2><div class="row-inner">${Array(6).fill('<div class="card skeleton"></div>').join('')}</div></div>`;
    
    const data = await fetchData(`/anime?genres=${id}&order_by=score&sort=desc`);
    container.innerHTML = '';
    renderRow(`${name} Collection`, data);
    window.scrollTo({ top: 500, behavior: 'smooth' });
}

// Navbar Scroll Effect
window.onscroll = () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 100) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
};

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator | ToolifyPro</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(99,102,241,0.3);
}

input{
padding:10px;
width:100%;
border:none;
border-radius:10px;
margin:10px 0;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.calc{background:#6366f1;color:white;}
.reset{background:#333;color:white;}

.result{
margin-top:20px;
display:none;
}

.card{
margin:10px 0;
padding:10px;
background:#111827;
border-radius:10px;
}

.back{
margin-top:10px;
display:block;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">
<h2>🎂 Age Calculator</h2>

<input type="date" id="dob">
<button class="calc" onclick="calc()">Calculate</button>
<button class="reset" onclick="reset()">Reset</button>

<div class="result" id="result">
<div class="card" id="age"></div>
<div class="card" id="extra"></div>
</div>

<a href="index.html" class="back">← Back</a>

</div>

<script>
function calc(){
let dob=document.getElementById("dob").value;
if(!dob) return;

let birth=new Date(dob);
let now=new Date();

let ageY=now.getFullYear()-birth.getFullYear();
let ageM=now.getMonth()-birth.getMonth();
let ageD=now.getDate()-birth.getDate();

if(ageD<0){ageM--; ageD+=30;}
if(ageM<0){ageY--; ageM+=12;}

document.getElementById("result").style.display="block";

document.getElementById("age").innerHTML=
`Age: ${ageY} Years ${ageM} Months ${ageD} Days`;

let diff=now-birth;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor(diff/(1000*60*60));
let minutes=Math.floor(diff/(1000*60));
let seconds=Math.floor(diff/1000);

document.getElementById("extra").innerHTML=
`Days: ${days}<br>Hours: ${hours}<br>Minutes: ${minutes}<br>Seconds: ${seconds}`;
}

function reset(){
document.getElementById("dob").value="";
document.getElementById("result").style.display="none";
}
</script>

</body>
</html>
